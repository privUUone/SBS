<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>SmartShot AI Pro</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .ui { background: #1e1e1e; padding: 15px; display: flex; gap: 15px; justify-content: center; align-items: center; border-bottom: 1px solid #333; }
        canvas { max-width: 95vw; border: 2px solid #444; margin-top: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .score-overlay { position: absolute; top: 80px; left: 20px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; border: 1px solid #007acc; text-align: left; min-width: 120px; }
        #status { color: #007acc; font-weight: bold; }
        input[type="number"] { width: 45px; background: #333; color: #fff; border: 1px solid #555; padding: 5px; }
    </style>
</head>
<body>
    <div class="ui">
        <div id="status">Lade KI...</div>
        <input type="file" id="u-img" accept="image/*">
        <label>Ringe: <input type="number" id="u-r" value="10"></label>
        <button id="u-btn" style="background:#007acc; color:white; border:none; padding:8px 15px; cursor:pointer;" disabled>Analyse</button>
    </div>
    <div style="position:relative; display: inline-block;">
        <canvas id="canvas"></canvas>
        <div id="score-card" class="score-overlay" style="display:none">
            <div style="font-size:1.2em; color:#4CAF50">Punkte: <span id="s-tot">0</span></div>
            <div style="font-size:0.9em; color:#aaa">Treffer: <span id="s-hit">0</span></div>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="cvRdy()"></script>
    <script>
        const $ = id => document.getElementById(id);
        let img = new Image();
        function cvRdy() { $('status').innerText='Bereit'; $('u-btn').disabled=0; }
        $('u-img').onchange = e => img.src = URL.createObjectURL(e.target.files[0]);

        $('u-btn').onclick = () => {
            let src = cv.imread(img), gray = new cv.Mat(), bw = new cv.Mat();
            
            // 1. MAX CONTRAST (Handy-App Effekt)
            // Wir skalieren die Helligkeit/Kontrast massiv hoch (Alpha 1.5, Beta -50)
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.convertScaleAbs(gray, gray, 1.6, -40); 
            cv.GaussianBlur(gray, gray, new cv.Size(5,5), 0);
            
            // Aggressiver Threshold für klare Kanten
            cv.adaptiveThreshold(gray, bw, 255, 1, 1, 35, 2);

            // 2. WARP LOGIK (Stabilisiert)
            let cnts = new cv.MatVector(), hier = new cv.Mat();
            cv.findContours(bw, cnts, hier, 0, 2);
            let maxA=0, maxI=-1;
            for(let i=0; i<cnts.size(); i++) {
                let a = cv.contourArea(cnts.get(i));
                if(a > maxA) { maxA=a; maxI=i; }
            }
            if(maxI < 0) return alert("Scheibe nicht erkannt");

            let rot = cv.minAreaRect(cnts.get(maxI)), pts = cv.RotatedRect.points(rot);
            // Ecken sortieren (Top-Left, Top-Right, Bottom-Right, Bottom-Left)
            pts.sort((a,b) => a.y - b.y);
            let tl = pts[0].x < pts[1].x ? pts[0] : pts[1], tr = pts[0].x < pts[1].x ? pts[1] : pts[0];
            let bl = pts[2].x < pts[3].x ? pts[2] : pts[3], br = pts[2].x < pts[3].x ? pts[3] : pts[2];

            let sz = 1000, out = new cv.Mat(), mG = new cv.Mat(), mB = new cv.Mat();
            let sT = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
            let dT = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, sz, 0, sz, sz, 0, sz]);
            let M_w = cv.getPerspectiveTransform(sT, dT);
            
            cv.warpPerspective(src, out, M_w, new cv.Size(sz, sz));
            cv.warpPerspective(gray, mG, M_w, new cv.Size(sz, sz));
            // Zweiten Threshold auf dem planen Bild
            cv.adaptiveThreshold(mG, mB, 255, 1, 1, 21, 5);

            // 3. RADIALE ANALYSE (Zentrum-fokussiert)
            let wCnt = new cv.MatVector(), sc=0, ht=0, rings=parseInt($('u-r').value);
            let mid = sz/2, maxR = sz/2, rW = maxR / rings;
            cv.findContours(mB, wCnt, hier, 1, 2);
            
            for(let i=0; i<wCnt.size(); i++){
                let c = wCnt.get(i), a = cv.contourArea(c), p = cv.arcLength(c, true);
                if(a < 30 || a > (sz*sz*0.4)) continue; // Ignoriere Rauschen & die ganze Scheibe

                let m = cv.moments(c), cx = m.m10/m.m00, cy = m.m01/m.m00;
                let d = Math.hypot(cx-mid, cy-mid);
                if(d > maxR * 0.98) continue; // Ignoriere Dinge am alleräußersten Rand

                // FORM-CHECK: Circularity = 4*PI*Area / Perimeter^2
                let circ = (4 * Math.PI * a) / (p * p);

                // LOGIK:
                // 1. Wenn es fast ein perfekter Kreis ist UND sehr groß -> Wahrscheinlich ein Ring-Rand
                if(circ > 0.85 && a > 1000) continue; 

                // 2. ZAHLEN-FILTER: Zahlen liegen oft auf einem Radius, der genau zwischen den Ringen ist.
                // Und sie sind meistens "unrund" (circ < 0.5)
                let onRingLine = Math.abs((d % rW)) < (rW * 0.15); // Nah an einer Ring-Linie?
                
                if(onRingLine && circ < 0.6) {
                    cv.drawContours(out, wCnt, i, [255,255,0,255], 2); // Gelb = Zahl/Ignoriert
                } else {
                    // 3. EINSCHUSSLOCH: Alles andere im Zielbereich
                    cv.drawContours(out, wCnt, i, [255,0,0,255], -1); // Rot = Treffer
                    cv.drawContours(out, wCnt, i, [255,255,255,255], 2);
                    sc += Math.max(0, rings - Math.floor(d/rW));
                    ht++;
                }
            }
            
            // Ringe zur Kontrolle (Blau)
            for(let r=1; r<=rings; r++) cv.circle(out, new cv.Point(mid,mid), rW*r, [0,150,255,255], 1);
            
            cv.imshow('canvas', out);
            $('s-tot').innerText=sc; $('s-hit').innerText=ht; $('score-card').style.display='block';
            [src,gray,bw,cnts,hier,out,mG,mB,sT,dT,M_w,wCnt].forEach(m => m.delete());
        };
    </script>
</body>
</html>

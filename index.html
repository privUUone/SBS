<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan Pro V3</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        #app-container { width: 100%; max-width: 500px; }
        .controls { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-group { display: flex; flex-direction: column; font-size: 12px; }
        input, select { padding: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; margin-top: 5px; }
        video, #output-canvas { width: 100%; border-radius: 12px; background: #000; display: block; }
        #output-canvas, #hidden-canvas { display: none; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #scan-btn { background: #e53935; color: white; }
        #reset-btn { background: #2196f3; color: white; display: none; }
        #loading { display: none; color: #ffeb3b; text-align: center; margin: 10px; }
        #result-panel { display: none; background: #1e1e1e; padding: 20px; border-radius: 12px; margin-top: 15px; width: 100%; box-sizing: border-box; }
        .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .total { font-weight: bold; color: #4caf50; font-size: 1.3em; border: none; }
    </style>
</head>
<body>

    <div id="app-container">
        <h2>TargetScan V3</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>Anzahl Ringe (z.B. 6):</label>
                <input type="number" id="ring-count" value="6">
            </div>
            <div class="control-group">
                <label>Empfindlichkeit:</label>
                <select id="sensitivity">
                    <option value="low">Niedrig (Nur klare Löcher)</option>
                    <option value="med" selected>Mittel (Standard)</option>
                    <option value="high">Hoch (Auch Fetzen)</option>
                </select>
            </div>
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="hidden-canvas"></canvas>
        
        <div id="loading">Berechne Treffer...</div>
        <button id="scan-btn" disabled>Warte auf OpenCV...</button>
        <button id="reset-btn">Nächster Durchgang</button>

        <div id="result-panel">
            <h3>Ergebnis</h3>
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const outputCanvas = document.getElementById('output-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const resetBtn = document.getElementById('reset-btn');
        const loading = document.getElementById('loading');
        const resultsList = document.getElementById('results-list');

        let cvReady = false;
        function onOpenCvReady() {
            cvReady = true;
            scanBtn.innerText = "Jetzt Scannen";
            scanBtn.disabled = false;
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => video.srcObject = s);

        scanBtn.addEventListener('click', () => {
            const ctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            outputCanvas.width = video.videoWidth;
            outputCanvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            video.style.display = 'none';
            scanBtn.style.display = 'none';
            loading.style.display = 'block';
            outputCanvas.style.display = 'block';

            setTimeout(processImage, 150);
        });

        resetBtn.addEventListener('click', () => {
            location.reload(); // Einfachster Reset für Kamera & Memory
        });

        function processImage() {
            let src = cv.imread(hiddenCanvas);
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);

            // PHASE 1: SCHEIBE FINDEN
            let blurred = new cv.Mat();
            cv.GaussianBlur(gray, blurred, new cv.Size(7, 7), 0);
            let circles = new cv.Mat();
            cv.HoughCircles(blurred, circles, cv.HOUGH_GRADIENT, 1, 100, 50, 35, 100, 0);

            if (circles.cols > 0) {
                let tx = circles.data32F[0];
                let ty = circles.data32F[1];
                let tr = circles.data32F[2];
                let numRings = parseInt(document.getElementById('ring-count').value);
                let ringW = tr / numRings;

                // Markiere Scheibe
                cv.circle(src, new cv.Point(tx, ty), tr, [0, 255, 0, 255], 2);

                // PHASE 2: LÖCHER FINDEN
                let thresh = new cv.Mat();
                // Dynamischer Threshold für unterschiedliche Kontraste
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_MEAN_C, cv.THRESH_BINARY_INV, 15, 8);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let sensitivity = document.getElementById('sensitivity').value;
                let minCirc = sensitivity === 'high' ? 0.4 : (sensitivity === 'med' ? 0.6 : 0.8);

                let treffer = [];
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    let perimeter = cv.arcLength(cnt, true);
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);

                    // Filter: Nur passende Größe und Rundheit
                    if (area > (tr*tr*0.0005) && area < (tr*tr*0.03) && circularity > minCirc) {
                        let M = cv.moments(cnt);
                        let cx = M.m10 / M.m00;
                        let cy = M.m01 / M.m00;
                        let dist = Math.sqrt((cx-tx)**2 + (cy-ty)**2);

                        // Ignoriere Konturen, die exakt das Zentrum sind (die "10")
                        if (dist < ringW * 0.4 && area > (ringW*ringW*0.5)) continue;

                        if (dist <= tr) {
                            let points = numRings - Math.floor(dist / ringW);
                            points = Math.max(1, Math.min(numRings, points));
                            treffer.push(points);

                            cv.drawContours(src, contours, i, [255, 0, 0, 255], 2);
                            cv.putText(src, points.toString(), new cv.Point(cx, cy), 1, 1.5, [255, 255, 0, 255], 2);
                        }
                    }
                }
                zeigeErgebnis(treffer);
                cv.imshow('output-canvas', src);
            } else {
                alert("Keine Scheibe gefunden. Bitte näher ran!");
                location.reload();
            }
            
            loading.style.display = 'none';
            resetBtn.style.display = 'block';
            src.delete(); gray.delete(); blurred.delete(); circles.delete();
        }

        function zeigeErgebnis(treffer) {
            resultsList.innerHTML = "";
            let sum = 0;
            let counts = {};
            treffer.forEach(p => { counts[p] = (counts[p] || 0) + 1; sum += p; });

            Object.keys(counts).sort((a,b) => b-a).forEach(p => {
                resultsList.innerHTML += `<div class="result-row"><span>${p}er Ring:</span><span>${counts[p]}x</span></div>`;
            });
            resultsList.innerHTML += `<div class="result-row total"><span>Gesamt:</span><span>${sum} Punkte</span></div>`;
            document.getElementById('result-panel').style.display = 'block';
        }
    </script>
</body>
</html>

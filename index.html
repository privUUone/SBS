<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV.js Fix - Schnelle Egalisierung</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #eef2f3; padding: 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 90%; }
        canvas { max-width: 100%; height: auto; border-radius: 4px; background: #fafafa; border: 1px solid #ddd; }
        .canvas-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .status-box { padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        .loading { background: #fff3cd; color: #856404; }
        .ready { background: #d4edda; color: #155724; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 1px dashed #bbb; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bild-Optimierer</h1>
    <div id="status" class="status-box loading">Warte auf OpenCV.js... (ca. 10MB Download)</div>
    
    <input type="file" id="fileInput" accept="image/*" disabled>
    
    <div class="canvas-group">
        <div>
            <p>Original (skaliert)</p>
            <canvas id="canvasInput"></canvas>
        </div>
        <div>
            <p>Ergebnis (Histogramm-Egalisierung)</p>
            <canvas id="canvasOutput"></canvas>
        </div>
    </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

<script type="text/javascript">
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    function onOpenCvReady() {
        status.innerHTML = 'Bereit! Bild hochladen.';
        status.className = 'status-box ready';
        fileInput.disabled = false;
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                processAndResize(img);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function processAndResize(img) {
        const canvasInput = document.getElementById('canvasInput');
        
        // --- RESIZE LOGIK (Verhindert Aufhängen) ---
        const maxDim = 1024; // Maximale Breite/Höhe
        let width = img.width;
        let height = img.height;

        if (width > maxDim || height > maxDim) {
            if (width > height) {
                height *= maxDim / width;
                width = maxDim;
            } else {
                width *= maxDim / height;
                height = maxDim;
            }
        }

        canvasInput.width = width;
        canvasInput.height = height;
        const ctx = canvasInput.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Starte OpenCV Verarbeitung
        processImage();
    }

    function processImage() {
        try {
            // 1. Matrix einlesen
            let src = cv.imread('canvasInput');
            let dst = new cv.Mat();
            
            // 2. Farbraum-Konvertierung (Wichtig für Farbbilder!)
            // Wir nutzen YCrCb: Y = Luminanz (Helligkeit)
            cv.cvtColor(src, src, cv.COLOR_RGBA2RGB); 
            cv.cvtColor(src, dst, cv.COLOR_RGB2YCrCb);
            
            // 3. Kanäle splitten
            let channels = new cv.MatVector();
            cv.split(dst, channels);
            
            // 4. Equalize auf dem Helligkeitskanal
            let yChannel = channels.get(0);
            cv.equalizeHist(yChannel, yChannel);
            
            // 5. Wieder zusammenfügen
            cv.merge(channels, dst);
            
            // 6. Zurück in anzeigbares Format
            cv.cvtColor(dst, dst, cv.COLOR_YCrCb2RGBA);
            
            // 7. Output
            cv.imshow('canvasOutput', dst);
            
            // Aufräumen (Memory Management)
            src.delete(); dst.delete(); yChannel.delete(); channels.delete();
            
        } catch (err) {
            console.error("Fehler bei der Verarbeitung:", err);
            alert("Da lief etwas schief. Schau in die Konsole!");
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schussbild Auswertung Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 2rem 1rem; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 800px; 
            background: var(--surface); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        h1 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; letter-spacing: -0.025em; }
        
        .status-box {
            padding: 1rem;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .status-box.ready { 
            background: rgba(34, 197, 94, 0.1); 
            color: var(--success); 
            border-color: rgba(34, 197, 94, 0.2);
        }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem; 
            padding: 1.5rem; 
            background: rgba(15, 23, 42, 0.5); 
            border-radius: 12px; 
            margin-bottom: 2rem;
        }

        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        
        input[type="file"] { font-size: 0.875rem; color: var(--text-dim); }
        
        input[type="number"] { 
            padding: 0.6rem; 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: 8px; 
            color: white;
            outline: none;
        }

        button { 
            grid-column: span 2;
            padding: 1rem; 
            font-weight: 700;
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 1rem;
        }
        button:hover:not(:disabled) { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: var(--border); color: var(--text-dim); cursor: not-allowed; }

        .canvas-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { max-width: 100%; height: auto; }

        .spinner {
            width: 18px; height: 18px;
            border: 3px solid currentColor;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 500px) {
            .controls { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Schuss-Analyse <span style="color:var(--primary)">Pro</span></h1>
    
    <div id="statusBox" class="status-box">
        <div id="spinner" class="spinner"></div>
        <span id="statusText">Lade Bildverarbeitungs-Modul...</span>
    </div>
    
    <div class="controls">
        <div class="control-group">
            <label>Bildquelle</label>
            <input type="file" id="imageInput" accept="image/*" disabled>
        </div>
        <div class="control-group">
            <label>Ringe (Soll)</label>
            <input type="number" id="rings" value="5" min="1" max="10" disabled>
        </div>
        <button id="scanButton" disabled>ANALYSE STARTEN</button>
    </div>

    <div class="canvas-container">
        <canvas id="outputCanvas"></canvas>
    </div>
</div>

<script async src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.9.0-release.3/dist/opencv.js" id="opencv-script"></script>

<script type="text/javascript">
    const imgInput = document.getElementById('imageInput');
    const scanBtn = document.getElementById('scanButton');
    const canvas = document.getElementById('outputCanvas');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');

    // Falls das Script nach 10 Sek nicht lädt, Fehlermeldung zeigen
    const loadTimeout = setTimeout(() => {
        if (typeof cv === 'undefined') {
            statusText.innerText = "Ladefehler: Bitte Seite neu laden oder Internet prüfen.";
        }
    }, 10000);

    function onOpenCvReady() {
        clearTimeout(loadTimeout);
        statusBox.className = 'status-box ready';
        spinner.style.display = 'none';
        statusText.innerText = 'System bereit für Scan';
        imgInput.disabled = false;
        document.getElementById('rings').disabled = false;
    }

    // OpenCV.js nutzt einen speziellen Hook
    if (typeof cv !== 'undefined') {
        onOpenCvReady();
    } else {
        document.getElementById('opencv-script').onload = onOpenCvReady;
    }

    imgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                scanBtn.disabled = false;
            }
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    scanBtn.addEventListener('click', () => {
        scanBtn.innerText = "VERARBEITE...";
        scanBtn.disabled = true;
        // Kurzes Timeout für UI-Update
        setTimeout(processImage, 100);
    });

    function processImage() {
        let src = cv.imread(canvas);
        let gray = new cv.Mat();
        let bw = new cv.Mat();
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();

        try {
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.adaptiveThreshold(gray, bw, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
            cv.findContours(bw, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

            let targetCenter = { x: 0, y: 0 };
            let maxRadius = 0;
            let mainIdx = -1;

            // 1. Suche Hauptkreis
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area > 1500) {
                    let circle = cv.minEnclosingCircle(cnt);
                    let cArea = Math.PI * circle.radius * circle.radius;
                    if (area / cArea > 0.7 && circle.radius > maxRadius) {
                        maxRadius = circle.radius;
                        targetCenter = circle.center;
                        mainIdx = i;
                    }
                }
                cnt.delete();
            }

            if (mainIdx === -1) {
                alert("Zielscheibe nicht erkannt!");
                return;
            }

            const numRings = parseInt(document.getElementById('rings').value) || 5;
            const rWidth = maxRadius / numRings;

            // Ringe zeichnen
            for (let j = 1; j <= numRings; j++) {
                cv.circle(src, targetCenter, j * rWidth, [59, 130, 246, 255], 2);
            }

            let numGroups = [];
            let holes = [];

            // 2. Scan Objekte
            for (let i = 0; i < contours.size(); ++i) {
                if (i === mainIdx) continue;
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);

                if (area > 20 && area < (maxRadius * maxRadius)) {
                    let M = cv.moments(cnt);
                    if (M.m00 !== 0) {
                        let cX = M.m10 / M.m00;
                        let cY = M.m01 / M.m00;
                        let d = Math.sqrt((cX-targetCenter.x)**2 + (cY-targetCenter.y)**2);

                        if (d <= maxRadius) {
                            let tol = maxRadius * 0.07;
                            let onAxis = Math.abs(cY - targetCenter.y) < tol || Math.abs(cX - targetCenter.x) < tol;

                            if (onAxis) {
                                let rIdx = Math.round(d / rWidth);
                                if (!numGroups[rIdx]) numGroups[rIdx] = [];
                                numGroups[rIdx].push({x: cX, y: cY, a: area});
                            } else {
                                holes.push({x: cX, y: cY, d: d});
                            }
                        }
                    }
                }
                cnt.delete();
            }

            // 3. Loch-in-Zahl Check
            numGroups.forEach(g => {
                if (g && g.length > 1) {
                    let avg = g.reduce((s, v) => s + v.a, 0) / g.length;
                    g.forEach(n => {
                        if (n.a > avg * 1.5) holes.push({x: n.x, y: n.y, d: Math.sqrt((n.x-targetCenter.x)**2 + (n.y-targetCenter.y)**2)});
                    });
                }
            });

            // 4. Score & Markierung
            let total = 0;
            holes.forEach(h => {
                let rHit = Math.floor(h.d / rWidth);
                let val = Math.max(0, Math.min(10, (10 - numRings + 1) + (numRings - 1 - rHit)));
                total += val;
                cv.circle(src, {x: h.x, y: h.y}, 10, [239, 68, 68, 255], 3);
                cv.putText(src, val.toString(), {x: h.x + 15, y: h.y}, cv.FONT_HERSHEY_SIMPLEX, 0.8, [239, 68, 68, 255], 2);
            });

            // Score-Overlay
            cv.rectangle(src, {x: 10, y: 10}, {x: 280, y: 80}, [30, 41, 59, 230], -1);
            cv.putText(src, `SCORE: ${total}`, {x: 30, y: 55}, cv.FONT_HERSHEY_SIMPLEX, 1.4, [34, 197, 94, 255], 3);

            cv.imshow('outputCanvas', src);

        } catch(e) {
            console.error(e);
            alert("Fehler bei der Analyse.");
        } finally {
            src.delete(); gray.delete(); bw.delete(); contours.delete(); hierarchy.delete();
            scanBtn.innerText = "ANALYSE STARTEN";
            scanBtn.disabled = false;
        }
    }
</script>

</body>
</html>

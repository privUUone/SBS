<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schießscheiben Scanner (Geometrie-Ansatz)</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #2c3e50; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        input[type="file"] { border: 1px solid #ccc; padding: 5px; border-radius: 4px; }
        input[type="number"] { width: 60px; padding: 5px; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .canvas-container { display: flex; gap: 20px; flex-wrap: wrap; }
        canvas { max-width: 100%; border: 1px solid #ddd; border-radius: 4px; background: #eee; }
        #status { font-weight: bold; color: #e67e22; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Geometrischer Target Scanner</h1>
    
    <div id="status">Lade OpenCV.js... Bitte warten.</div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" disabled>
        <label>Anzahl Ringe: 
            <input type="number" id="ringCount" value="5" min="1" max="10">
        </label>
        <label>Toleranz Achse (px): 
            <input type="number" id="axisTolerance" value="15" min="1" max="50">
        </label>
        <button id="scanBtn" disabled>Bild Analysieren</button>
    </div>

    <div class="canvas-container">
        <div>
            <h3>Originalbild</h3>
            <canvas id="canvasInput"></canvas>
        </div>
        <div>
            <h3>Analyse (Ergebnis)</h3>
            <canvas id="canvasOutput"></canvas>
        </div>
    </div>
</div>

<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

<script>
    let imgElement = new Image();
    let isCvReady = false;

    function onOpenCvReady() {
        document.getElementById('status').innerText = 'OpenCV ist bereit! Bild hochladen.';
        document.getElementById('status').style.color = '#27ae60';
        document.getElementById('imageInput').disabled = false;
        isCvReady = true;
    }

    // Bild hochladen und auf Input-Canvas zeichnen
    document.getElementById('imageInput').addEventListener('change', (e) => {
        let file = e.target.files[0];
        if (!file) return;
        
        let reader = new FileReader();
        reader.onload = function(event) {
            imgElement.src = event.target.result;
            imgElement.onload = function() {
                let canvas = document.getElementById('canvasInput');
                let ctx = canvas.getContext('2d');
                // Skaliere Bild für bessere Web-Performance
                let MAX_WIDTH = 800;
                let scale = Math.min(MAX_WIDTH / imgElement.width, 1);
                canvas.width = imgElement.width * scale;
                canvas.height = imgElement.height * scale;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                document.getElementById('scanBtn').disabled = false;
            }
        };
        reader.readAsDataURL(file);
    });

    // Hauptalgorithmus (Dein Workflow)
    document.getElementById('scanBtn').addEventListener('click', () => {
        if (!isCvReady) return;

        let canvasInput = document.getElementById('canvasInput');
        let src = cv.imread(canvasInput);
        let dst = src.clone(); // Für das visuelle Ergebnis
        let gray = new cv.Mat();
        let binary = new cv.Mat();

        let ringCount = parseInt(document.getElementById('ringCount').value);
        let tolerance = parseInt(document.getElementById('axisTolerance').value);

        // 1. Schwarz-Weiß Bild erstellen
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
        
        // Adaptiver Threshold hilft bei ungleichmäßiger Beleuchtung besser als ein harter Cutoff
        cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);

        // Konturen finden
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(binary, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

        let targetCenter = null;
        let maxRadius = 0;

        // 2. Äußersten Ring finden (Suche nach der größten, relativ runden Kontur)
        for (let i = 0; i < contours.size(); ++i) {
            let cnt = contours.get(i);
            let area = cv.contourArea(cnt);
            if (area < 5000) continue; // Zu klein für den Außenring

            let perimeter = cv.arcLength(cnt, true);
            let circularity = (4 * Math.PI * area) / (perimeter * perimeter);

            if (circularity > 0.7) { // 1.0 wäre ein perfekter Kreis
                let circleInfo = cv.minEnclosingCircle(cnt);
                if (circleInfo.radius > maxRadius) {
                    maxRadius = circleInfo.radius;
                    targetCenter = circleInfo.center;
                }
            }
        }

        if (!targetCenter) {
            alert("Konnte den Außenring nicht finden! Bild evtl. zu schräg oder schlecht beleuchtet.");
            // Cleanup
            src.delete(); dst.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();
            return;
        }

        // Zeichne Zentrum und Außenring zur Kontrolle (Blau)
        cv.circle(dst, targetCenter, maxRadius, [255, 0, 0, 255], 2);
        cv.circle(dst, targetCenter, 3, [255, 0, 0, 255], -1);

        // 3. Ringbreite berechnen
        let ringWidth = maxRadius / ringCount;

        let numberContours = [];
        let holeContours = [];

        // 4. & 5. Alle restlichen Konturen klassifizieren (Zahlen vs. Löcher)
        for (let i = 0; i < contours.size(); ++i) {
            let cnt = contours.get(i);
            let area = cv.contourArea(cnt);
            
            // Ignoriere Rauschen und den riesigen Außenring selbst
            if (area < 10 || area > maxRadius * maxRadius) continue;

            let M = cv.moments(cnt, false);
            if (M.m00 === 0) continue;
            let cx = M.m10 / M.m00;
            let cy = M.m01 / M.m00;

            // Distanz zum Zentrum
            let dx = cx - targetCenter.x;
            let dy = cy - targetCenter.y;
            let distanceToCenter = Math.sqrt(dx*dx + dy*dy);

            // Ist es im äußeren Ring?
            if (distanceToCenter > maxRadius) continue;

            // Prüfen ob Zentrum auf der horizontalen oder vertikalen Achse liegt (Fadenkreuz)
            let isOnHorizontalAxis = Math.abs(cy - targetCenter.y) < tolerance;
            let isOnVerticalAxis = Math.abs(cx - targetCenter.x) < tolerance;

            if (isOnHorizontalAxis || isOnVerticalAxis) {
                // Das ist potentiell eine Zahl!
                // Speichere sie mit ihrem Ring-Abstand (gerundet) um später Gruppen zu bilden
                let ringIndex = Math.floor(distanceToCenter / ringWidth);
                numberContours.push({
                    contour: cnt,
                    cx: cx, cy: cy,
                    area: area,
                    ringIndex: ringIndex,
                    originalIndex: i
                });
                
                // Markiere gefundene Zahl grün
                let color = new cv.Scalar(0, 255, 0, 255);
                cv.drawContours(dst, contours, i, color, 1, cv.LINE_8, hierarchy, 0);
            } else {
                // Keine Zahl, liegt abseits des Kreuzes -> Potentielles Einschussloch (Restliche Flecken)
                // Filter für echte Löcher: Müssen relativ rund sein und eine gewisse Mindestgröße haben
                let perimeter = cv.arcLength(cnt, true);
                let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                
                if (circularity > 0.4 && area > 20) { // Tolerante Werte für ausgefranste Löcher
                    holeContours.push({ cx: cx, cy: cy, area: area });
                    // Markiere "freies" Loch rot
                    cv.circle(dst, new cv.Point(cx, cy), 5, [255, 0, 0, 255], -1);
                }
            }
        }

        // 6. & 7. Löcher IN Zahlen finden (Flächenvergleich)
        // Gruppiere Zahlen nach Ring
        let numbersByRing = {};
        numberContours.forEach(num => {
            if (!numbersByRing[num.ringIndex]) numbersByRing[num.ringIndex] = [];
            numbersByRing[num.ringIndex].push(num);
        });

        // Vergleiche Flächen innerhalb eines Rings
        for (let ring in numbersByRing) {
            let numsInRing = numbersByRing[ring];
            if (numsInRing.length < 2) continue; // Brauchen mindestens 2 zum Vergleichen

            // Berechne Durchschnittsfläche der Zahlen in diesem Ring (Median wäre robuster, aber Durchschnitt reicht hier meist)
            let totalArea = numsInRing.reduce((sum, n) => sum + n.area, 0);
            let avgArea = totalArea / numsInRing.length;

            numsInRing.forEach(num => {
                // Wenn die Fläche 50% größer ist als der Durchschnitt, werten wir es als überlappendes Loch
                if (num.area > avgArea * 1.5) {
                    holeContours.push({ cx: num.cx, cy: num.cy, area: num.area });
                    // Markiere überschneidendes Loch gelb (zur Verdeutlichung)
                    cv.circle(dst, new cv.Point(num.cx, num.cy), 7, [255, 255, 0, 255], 2);
                }
            });
        }

        // Visualisierung: Ergebnis auf Canvas zeichnen
        cv.imshow('canvasOutput', dst);

        // Aufräumen (Memory Management in WebAssembly ist kritisch!)
        src.delete(); dst.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();

        // Konsolen-Output der Ergebnisse
        console.log(`Analyse beendet. Gefundene Einschusslöcher: ${holeContours.length}`);
    });
</script>

</body>
</html>

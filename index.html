<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan V5 - Histogram Logic</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        #app-container { width: 100%; max-width: 450px; }
        .controls { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        input { width: 60px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; text-align: center; }
        video, canvas { width: 100%; border-radius: 12px; background: #000; display: block; }
        #output-canvas, #hidden-canvas { display: none; }
        button { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #scan-btn { background: #e53935; color: white; }
        #reset-btn { background: #2196f3; color: white; display: none; }
        #status { text-align: center; margin: 10px; color: #ffeb3b; }
        #result-panel { display: none; background: #1e1e1e; padding: 15px; border-radius: 12px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; }
        .total { font-weight: bold; color: #4caf50; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="controls">
            <div><label>Ringe:</label> <input type="number" id="ring-count" value="6"></div>
            <div id="ring-info" style="font-size: 0.8em; color: #aaa;">Mitte=10, Außen=5</div>
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="hidden-canvas"></canvas>
        
        <div id="status">Warte auf OpenCV...</div>
        <button id="scan-btn" disabled>Scan starten</button>
        <button id="reset-btn">Neuer Scan</button>

        <div id="result-panel">
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const outputCanvas = document.getElementById('output-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const resetBtn = document.getElementById('reset-btn');
        const status = document.getElementById('status');
        const resultsList = document.getElementById('results-list');

        function onOpenCvReady() {
            status.innerText = "Bereit";
            scanBtn.disabled = false;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(s => video.srcObject = s);
        }

        scanBtn.addEventListener('click', () => {
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            hiddenCanvas.getContext('2d').drawImage(video, 0, 0);
            video.style.display = 'none';
            scanBtn.style.display = 'none';
            status.innerText = "Berechne Graustufen...";
            outputCanvas.style.display = 'block';
            setTimeout(processImage, 100);
        });

        resetBtn.addEventListener('click', () => { location.reload(); });

        function processImage() {
            let src = cv.imread(hiddenCanvas);
            let dst = new cv.Mat();
            // Downscale auf 512x512 für Stabilität
            cv.resize(src, dst, new cv.Size(512, 512), 0, 0, cv.INTER_AREA);
            
            let gray = new cv.Mat();
            cv.cvtColor(dst, gray, cv.COLOR_RGBA2GRAY, 0);

            // SCHRITT 1: ÄUSSERSTEN RING FINDEN (Adaptive Threshold für dünne Linien)
            let binary = new cv.Mat();
            cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 10);

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let target = null;
            let maxArea = 0;
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                // Suche die größte Kontur, die fast quadratisch ist
                if (area > maxArea && area > 10000) {
                    let rect = cv.boundingRect(cnt);
                    let ratio = rect.width / rect.height;
                    if (ratio > 0.7 && ratio < 1.3) {
                        maxArea = area;
                        target = { x: rect.x + rect.width/2, y: rect.y + rect.height/2, r: (rect.width + rect.height)/4, rect: rect };
                    }
                }
            }

            if (!target) {
                status.innerText = "Fehler: Äußerer Ring nicht erkannt!";
                resetBtn.style.display = "block";
                return;
            }

            // SCHRITT 2: GRAUSTUFEN-SAMPLING INNERHALB DER SCHEIBE
            // Wir erstellen eine Maske für das Innere der Scheibe
            let mask = cv.Mat.zeros(gray.rows, gray.cols, cv.CV_8U);
            cv.circle(mask, new cv.Point(target.x, target.y), target.r, [255, 255, 255, 255], -1);
            
            // Berechne Durchschnittshelligkeit des Papiers
            let mean = cv.mean(gray, mask)[0]; 
            
            // Löcher sind DEUTLICH dunkler (z.B. Hintergrund oder Schatten im Loch)
            // Alles, was z.B. 40 Einheiten dunkler als der Durchschnitt ist
            let holeThresh = new cv.Mat();
            cv.threshold(gray, holeThresh, mean - 50, 255, cv.THRESH_BINARY_INV);
            
            // Maskiere den Bereich außerhalb der Scheibe weg
            let maskedHoles = new cv.Mat();
            cv.bitwise_and(holeThresh, mask, maskedHoles);

            // SCHRITT 3: LOCH-CLUSTER ANALYSIEREN
            let holeContours = new cv.MatVector();
            cv.findContours(maskedHoles, holeContours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let numRings = parseInt(document.getElementById('ring-count').value);
            let ringW = target.r / numRings;
            let treffer = [];
            let holeAreas = [];

            // Erste Runde: Valide Flächen sammeln
            for (let i = 0; i < holeContours.size(); ++i) {
                let cnt = holeContours.get(i);
                let area = cv.contourArea(cnt);
                if (area > 20 && area < (maxArea * 0.05)) { // Keine Riesenflächen
                    let M = cv.moments(cnt);
                    let cx = M.m10 / M.m00;
                    let cy = M.m01 / M.m00;
                    let dist = Math.hypot(cx - target.x, cy - target.y);
                    
                    // Ignoriere das schwarze Zentrum der Scheibe selbst!
                    // Wenn der Abstand sehr klein ist UND die Fläche groß, ist es der 10er-Ring
                    if (dist < ringW * 0.5 && area > (ringW * ringW * 0.4)) continue;

                    holeAreas.push({area, dist, cx, cy});
                }
            }

            // Zweite Runde: Multi-Treffer Berechnung
            if (holeAreas.length > 0) {
                holeAreas.sort((a,b) => a.area - b.area);
                let medianArea = holeAreas[Math.floor(holeAreas.length / 2)].area;

                holeAreas.forEach(h => {
                    let shots = Math.max(1, Math.round(h.area / medianArea));
                    // Punktlogik: Mitte=10, Außen=10-Ringe+1
                    let p = 10 - Math.floor(h.dist / ringW);
                    p = Math.max(10 - numRings + 1, Math.min(10, p));

                    for(let s=0; s<shots; s++) treffer.push(p);

                    cv.circle(dst, new cv.Point(h.cx, h.cy), 4, [255, 0, 0, 255], -1);
                    cv.putText(dst, p.toString(), new cv.Point(h.cx+5, h.cy-5), 1, 1.2, [255, 255, 0, 255], 2);
                });
            }

            cv.circle(dst, new cv.Point(target.x, target.y), target.r, [0, 255, 0, 255], 2);
            cv.imshow('output-canvas', dst);
            zeigeErgebnis(treffer);
            status.innerText = "Fertig";
            resetBtn.style.display = "block";

            // Aufräumen
            src.delete(); dst.delete(); gray.delete(); binary.delete(); mask.delete(); 
            holeThresh.delete(); maskedHoles.delete(); contours.delete(); 
            holeContours.delete(); hierarchy.delete();
        }

        function zeigeErgebnis(treffer) {
            resultsList.innerHTML = "";
            let sum = 0; let counts = {};
            treffer.forEach(p => { counts[p] = (counts[p] || 0) + 1; sum += p; });
            Object.keys(counts).sort((a,b) => b-a).forEach(p => {
                resultsList.innerHTML += `<div class="result-row"><span>${p}er Ring:</span><span>${counts[p]}x</span></div>`;
            });
            resultsList.innerHTML += `<div class="result-row total"><span>Gesamt: ${sum}</span></div>`;
            document.getElementById('result-panel').style.display = 'block';
        }
    </script>
</body>
</html>

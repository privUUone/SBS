<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Scanner Pro - Geometrie Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; margin-top: 0; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .top-bar { display: flex; gap: 20px; flex-wrap: wrap; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; align-items: center; border: 1px solid #dee2e6; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: bold; color: #5f6368; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #dadce0; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; }
        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 30px; }
        canvas { width: 100%; height: auto; background: #333; border-radius: 8px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .sidebar { background: #ffffff; border: 1px solid #dadce0; border-radius: 10px; padding: 20px; }
        .score-big { font-size: 3rem; font-weight: bold; text-align: center; color: #202124; margin: 10px 0; }
        .hit-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f3f4; font-size: 0.9rem; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .badge-red { background: #fce8e6; color: #d93025; }
        .badge-yellow { background: #fef7e0; color: #f9ab00; }
        #status { color: #1a73e8; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Target Scanner Pro</h1>
    <div id="status">Warte auf OpenCV...</div>

    <div class="top-bar">
        <div class="control-group">
            <label>Bildquelle</label>
            <input type="file" id="fileInput" accept="image/*" disabled>
        </div>
        <div class="control-group">
            <label>Ringe (Anzahl)</label>
            <input type="number" id="ringCount" value="10" min="1" max="15">
        </div>
        <div class="control-group">
            <label>Achsen-Toleranz (px)</label>
            <input type="number" id="tolerance" value="25" min="5" max="100">
        </div>
        <button id="processBtn" disabled>Scan starten</button>
    </div>

    <div class="main-layout">
        <div class="view">
            <canvas id="outputCanvas"></canvas>
        </div>
        <div class="sidebar">
            <h3 style="margin-top:0">Ergebnis</h3>
            <div class="score-big" id="totalScore">0</div>
            <div style="text-align:center; color:#70757a; margin-bottom:20px;">GESAMTPUNKTE</div>
            <div id="hitList"></div>
        </div>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>
<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="cvReady()"></script>

<script>
let isReady = false;
const statusEl = document.getElementById('status');

function cvReady() {
    statusEl.innerText = "OpenCV geladen. Bereit zum Scan.";
    document.getElementById('fileInput').disabled = false;
    isReady = true;
}

document.getElementById('fileInput').onchange = function(e) {
    let reader = new FileReader();
    reader.onload = function(event) {
        let img = new Image();
        img.onload = function() {
            let canvas = document.getElementById('hiddenCanvas');
            let ctx = canvas.getContext('2d');
            let scale = Math.min(1000 / img.width, 1);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            document.getElementById('processBtn').disabled = false;
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('processBtn').onclick = function() {
    const src = cv.imread('hiddenCanvas');
    const dst = src.clone();
    const gray = new cv.Mat();
    const binary = new cv.Mat();
    
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();
    cv.findContours(binary, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

    // 1. Zentrum finden (Größter runder Ring)
    let center = null;
    let maxR = 0;
    for (let i = 0; i < contours.size(); ++i) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);
        if (area < 1000) continue;
        let circle = cv.minEnclosingCircle(cnt);
        let circularity = (4 * Math.PI * area) / (cv.arcLength(cnt, true) ** 2);
        if (circularity > 0.5 && circle.radius > maxR) {
            maxR = circle.radius;
            center = circle.center;
        }
    }

    if (!center) { alert("Scheibe nicht erkannt!"); return; }

    // Hilfswerte
    const ringQty = parseInt(document.getElementById('ringCount').value);
    const tol = parseInt(document.getElementById('tolerance').value);
    const ringW = maxR / ringQty;
    let hits = [];
    let numberData = [];

    // 2. Loop durch alle Formen
    for (let i = 0; i < contours.size(); ++i) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);
        if (area < 20 || area > (maxR * maxR)) continue;

        let M = cv.moments(cnt);
        let cx = M.m10 / M.m00;
        let cy = M.m01 / M.m00;
        let dist = Math.sqrt((cx - center.x)**2 + (cy - center.y)**2);
        if (dist > maxR) continue;

        let onAxis = (Math.abs(cx - center.x) < tol || Math.abs(cy - center.y) < tol);

        if (onAxis) {
            numberData.push({ area, cx, cy, dist, ring: Math.floor(dist / ringW), idx: i });
            cv.drawContours(dst, contours, i, [0, 255, 0, 255], 1);
        } else {
            let circ = (4 * Math.PI * area) / (cv.arcLength(cnt, true) ** 2);
            if (circ > 0.3) {
                hits.push({ dist, score: Math.max(0, 10 - Math.floor(dist / ringW)), type: 'Direkt' });
                cv.circle(dst, new cv.Point(cx, cy), 8, [255, 0, 0, 255], 2);
            }
        }
    }

    // 3. Flächen-Abgleich (Der "8er" Fix)
    // Wir gruppieren nach Ringen und nutzen den Median der Flächen
    let groups = {};
    numberData.forEach(n => {
        if (!groups[n.ring]) groups[n.ring] = [];
        groups[n.ring].push(n);
    });

    for (let r in groups) {
        let sorted = groups[r].sort((a, b) => a.area - b.area);
        let medianArea = sorted[Math.floor(sorted.length / 2)].area;
        
        sorted.forEach(n => {
            // Ein Loch muss die Fläche extrem verändern (Faktor 2.2 statt 1.5)
            // Oder die Zahl ist durch das Loch extrem klein geworden (Faktor 0.4)
            if (n.area > medianArea * 2.2 || n.area < medianArea * 0.4) {
                hits.push({ dist: n.dist, score: Math.max(0, 10 - Math.floor(n.dist / ringW)), type: 'Korrektur' });
                cv.circle(dst, new cv.Point(n.cx, n.cy), 10, [255, 255, 0, 255], 2);
            }
        });
    }

    // Anzeige
    cv.circle(dst, center, maxR, [255, 0, 0, 255], 2);
    cv.imshow('outputCanvas', dst);
    
    // Scoreboard
    let total = 0;
    let listHtml = "";
    hits.forEach((h, i) => {
        total += h.score;
        listHtml += `<div class="hit-item">
            <span>Treffer ${i+1} <span class="badge ${h.type=='Direkt'?'badge-red':'badge-yellow'}">${h.type}</span></span>
            <strong>${h.score} Pkt</strong>
        </div>`;
    });
    document.getElementById('totalScore').innerText = total;
    document.getElementById('hitList').innerHTML = listHtml;

    src.delete(); dst.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();
};
</script>
</body>
</html>

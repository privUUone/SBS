<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan V10 - PixelLogic</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        #app-container { width: 100%; max-width: 480px; }
        .card { background: #181818; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        input, slider { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 5px; }
        #progress-container { width: 100%; height: 6px; background: #222; border-radius: 3px; margin: 10px 0; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: #00e676; transition: width 0.1s; }
        video, canvas { width: 100%; border-radius: 12px; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #output-canvas, #hidden-canvas { display: none; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        #scan-btn { background: #d32f2f; color: white; }
        #scan-btn:disabled { background: #444; opacity: 0.5; }
        #reset-btn { background: #1976d2; color: white; display: none; }
        #status { text-align: center; color: #ffb300; font-size: 13px; margin-top: 5px; min-height: 1.2em; }
        .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 15px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="card">
            <div class="row">
                <label>Anzahl Farben (Karte):</label>
                <input type="number" id="color-count" value="2" min="1" max="5">
            </div>
            <div class="row">
                <label>Min. Loch-Größe (%):</label>
                <input type="number" id="min-size" value="0.8" step="0.1" min="0.1">
            </div>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="status">Warte auf OpenCV...</div>
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="hidden-canvas"></canvas>
        
        <button id="scan-btn" disabled>Scan starten</button>
        <button id="reset-btn">Nächste Karte</button>

        <div id="result-panel" class="card" style="display:none;">
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const outputCanvas = document.getElementById('output-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const resetBtn = document.getElementById('reset-btn');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        function onOpenCvReady() {
            status.innerText = "Bereit";
            scanBtn.disabled = false;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280 } })
                .then(s => video.srcObject = s);
        }

        function updateUI(percent, text) {
            progressBar.style.width = percent + "%";
            status.innerText = text;
        }

        scanBtn.addEventListener('click', async () => {
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            hiddenCanvas.getContext('2d').drawImage(video, 0, 0);
            
            video.style.display = 'none';
            scanBtn.style.display = 'none';
            progressContainer.style.display = 'block';
            outputCanvas.style.display = 'block';

            await process();
        });

        async function process() {
            let src = cv.imread(hiddenCanvas);
            let dst = new cv.Mat();
            
            // 1. Schnelle Kreissuche auf Mini-Bild (verhindert Aufhängen)
            updateUI(20, "Ortung der Karte...");
            await sleep(10);
            let small = new cv.Mat();
            cv.resize(src, small, new cv.Size(300, 300 * src.rows / src.cols), 0, 0, cv.INTER_AREA);
            let smallGray = new cv.Mat();
            cv.cvtColor(small, smallGray, cv.COLOR_RGBA2GRAY, 0);
            cv.GaussianBlur(smallGray, smallGray, new cv.Size(5, 5), 1.5);
            
            let circles = new cv.Mat();
            // Erhöhte param2 für Geschwindigkeit und Stabilität
            cv.HoughCircles(smallGray, circles, cv.HOUGH_GRADIENT, 1.2, 100, 50, 40, 80, 150);

            if (circles.cols === 0) {
                status.innerText = "Fehler: Kreise nicht gefunden!";
                resetBtn.style.display = "block";
                return;
            }

            // Umrechnung auf Originalgröße
            let ratio = src.cols / 300;
            let tx = circles.data32F[0] * ratio;
            let ty = circles.data32F[1] * ratio;
            let tr = circles.data32F[2] * ratio;

            // 2. Graubereich-Analyse (Histogramm)
            updateUI(50, "Grauwerte sortieren...");
            await sleep(10);
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
            
            let mask = cv.Mat.zeros(gray.rows, gray.cols, cv.CV_8U);
            cv.circle(mask, new cv.Point(tx, ty), tr, [255, 255, 255, 255], -1);

            let hist = new cv.Mat();
            let maskVec = new cv.MatVector(); maskVec.push_back(mask);
            cv.calcHist(maskVec, [0], mask, hist, [256], [0, 256]);

            // Alle vorkommenden Graustufen sammeln
            let bins = [];
            for (let i = 0; i < 256; i++) {
                if (hist.data32F[i] > 10) bins.push({ val: i, count: hist.data32F[i] });
            }
            // Nach Häufigkeit sortieren
            bins.sort((a, b) => b.count - a.count);

            // X häufigste Farben als "Karte" definieren (Input vom User)
            let cardColorCount = parseInt(document.getElementById('color-count').value);
            let cardBins = bins.slice(0, cardColorCount).map(b => b.val);
            
            // Restliche Bereiche als Loch-Kandidaten (Anomalien)
            let totalPixels = Math.PI * tr * tr;
            let minHolePercent = parseFloat(document.getElementById('min-size').value) / 100;
            
            let holeValues = bins.filter(b => 
                !cardBins.includes(b.val) && 
                b.count > (totalPixels * minHolePercent) &&
                b.val < 230 // Glanzlichter ignorieren
            ).map(b => b.val);

            updateUI(70, "Löcher isolieren...");
            await sleep(10);
            
            let anomalyMask = cv.Mat.zeros(gray.rows, gray.cols, cv.CV_8U);
            for (let v of holeValues) {
                let temp = new cv.Mat();
                cv.inRange(gray, new cv.Mat(gray.rows, gray.cols, gray.type(), [v-1]), 
                                 new cv.Mat(gray.rows, gray.cols, gray.type(), [v+1]), temp);
                cv.bitwise_or(anomalyMask, temp, anomalyMask);
                temp.delete();
            }
            cv.bitwise_and(anomalyMask, mask, anomalyMask);

            // 3. Positionen der Anomalien finden
            updateUI(90, "Punkte berechnen...");
            await sleep(10);
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(anomalyMask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let treffer = [];
            let ringCount = parseInt(document.getElementById('ring-count').value || 6);
            let ringW = tr / ringCount;
            let finalHoles = [];

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area > (totalPixels * 0.001)) { // Harte Untergrenze gegen Bildrauschen
                    let M = cv.moments(cnt);
                    let cx = M.m10 / M.m00, cy = M.m01 / M.m00;
                    let d = Math.sqrt(Math.pow(cx - tx, 2) + Math.pow(cy - ty, 2));
                    if (d < tr) finalHoles.push({area, d, cx, cy});
                }
            }

            // Multi-Loch Logik basierend auf Median-Fläche
            if (finalHoles.length > 0) {
                finalHoles.sort((a,b) => a.area - b.area);
                let med = finalHoles[Math.floor(finalHoles.length / 2)].area;
                
                finalHoles.forEach(h => {
                    let count = Math.max(1, Math.round(h.area / med));
                    let pts = 10 - Math.floor(h.d / ringW);
                    pts = Math.max(10 - ringCount + 1, Math.min(10, pts));
                    for(let k=0; k<count; k++) treffer.push(pts);
                    
                    cv.circle(src, new cv.Point(h.cx, h.cy), 10, [255, 0, 0, 255], -1);
                    cv.putText(src, pts.toString(), new cv.Point(h.cx+15, h.cy-15), 1, 3.0, [255, 255, 0, 255], 3);
                });
            }

            cv.circle(src, new cv.Point(tx, ty), tr, [0, 255, 0, 255], 5);
            cv.imshow('output-canvas', src);
            displayResults(treffer);
            
            updateUI(100, "Fertig!");
            resetBtn.style.display = "block";
            [src, dst, small, smallGray, circles, gray, mask, hist, maskVec, anomalyMask, contours, hierarchy].forEach(m => m.delete());
        }

        function displayResults(treffer) {
            const list = document.getElementById('results-list');
            list.innerHTML = "";
            let sum = 0, c = {};
            treffer.forEach(p => { c[p] = (c[p] || 0) + 1; sum += p; });
            Object.keys(c).sort((a,b) => b-a).forEach(p => {
                list.innerHTML += `<div class="result-row"><span>${p}er Ring:</span><span>${c[p]}x</span></div>`;
            });
            list.innerHTML += `<div class="result-row" style="font-weight:bold; color:#00e676;"><span>SUMME:</span><span>${sum}</span></div>`;
            document.getElementById('result-panel').style.display = 'block';
        }

        resetBtn.addEventListener('click', () => { location.reload(); });
    </script>
</body>
</html>

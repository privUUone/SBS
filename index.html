<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShot AI</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #00ffcc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--accent); }
        .controls { background-color: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .canvas-container { position: relative; display: inline-block; }
        canvas { max-width: 100%; border: 1px solid #333; border-radius: 4px; }
        #scorePanel { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); display: none; }
        .score-value { font-size: 24px; font-weight: bold; color: var(--accent); }
        #status { margin-bottom: 15px; font-weight: bold; color: #ffeb3b; }
        input[type="file"] { color: var(--text); }
    </style>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <h1>🎯 SmartShot AI</h1>
    <div id="status">Lade OpenCV.js... Bitte warten.</div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" disabled>
        <button id="processBtn" disabled>Schussbild auswerten</button>
    </div>

    <div class="canvas-container">
        <canvas id="canvasOutput"></canvas>
        <div id="scorePanel">
            <div>Gesamt-Score: <span id="totalScore" class="score-value">0</span></div>
            <div>Erkannte Treffer: <span id="hitCount">0</span></div>
        </div>
    </div>

<script>
    let cvReady = false;

    function onOpenCvReady() {
        cvReady = true;
        document.getElementById('status').innerText = 'OpenCV.js ist bereit! Lade ein Bild hoch.';
        document.getElementById('status').style.color = '#00ffcc';
        document.getElementById('imageInput').disabled = false;
    }

    const imgInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    let imgElement = new Image();

    imgInput.addEventListener('change', (e) => {
        imgElement.src = URL.createObjectURL(e.target.files[0]);
        imgElement.onload = () => {
            processBtn.disabled = false;
            // Bild initial auf Canvas zeichnen
            let canvas = document.getElementById('canvasOutput');
            let ctx = canvas.getContext('2d');
            canvas.width = imgElement.width;
            canvas.height = imgElement.height;
            ctx.drawImage(imgElement, 0, 0);
        }
    });

    processBtn.addEventListener('click', () => {
        if (!cvReady) return;
        processTarget();
    });

    function processTarget() {
        let src = cv.imread(imgElement);
        let gray = new cv.Mat();
        
        // 1. Globaler Kontrast-Boost
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        let enhanced = new cv.Mat();
        // Spreizung des Histogramms (Simulation "100% Kontrast")
        gray.convertTo(enhanced, -1, 1.5, -50); 

        // 2. High-Contrast Binarisierung
        let binary = new cv.Mat();
        cv.adaptiveThreshold(enhanced, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);

        // 3. Target Detection & Perspective Warp
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        let maxArea = 0;
        let largestContourIndex = -1;
        for (let i = 0; i < contours.size(); ++i) {
            let area = cv.contourArea(contours.get(i));
            if (area > maxArea) {
                maxArea = area;
                largestContourIndex = i;
            }
        }

        if (largestContourIndex === -1) {
            alert("Zielscheibe nicht gefunden!");
            return;
        }

        // minAreaRect zur Eckpunktbestimmung
        let targetContour = contours.get(largestContourIndex);
        let rotatedRect = cv.minAreaRect(targetContour);
        let vertices = cv.RotatedRect.points(rotatedRect);
        
        // Ecken sortieren (Top-Left, Top-Right, Bottom-Right, Bottom-Left)
        // (Vereinfachte Logik für das PoC)
        vertices.sort((a, b) => a.y - b.y);
        let top = vertices.slice(0, 2).sort((a, b) => a.x - b.x);
        let bottom = vertices.slice(2, 4).sort((a, b) => b.x - a.x);
        let orderedVertices = [...top, ...bottom];

        let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
            orderedVertices[0].x, orderedVertices[0].y,
            orderedVertices[1].x, orderedVertices[1].y,
            orderedVertices[2].x, orderedVertices[2].y,
            orderedVertices[3].x, orderedVertices[3].y
        ]);

        // Ziel-Quadrat erstellen (z.B. 800x800)
        const WARP_SIZE = 800;
        let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
            0, 0,
            WARP_SIZE, 0,
            WARP_SIZE, WARP_SIZE,
            0, WARP_SIZE
        ]);

        let M = cv.getPerspectiveTransform(srcTri, dstTri);
        let warped = new cv.Mat();
        let warpedColor = new cv.Mat();
        let dsize = new cv.Size(WARP_SIZE, WARP_SIZE);
        
        // Warp auf Binärbild und Farbbild anwenden
        cv.warpPerspective(binary, warped, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
        cv.warpPerspective(src, warpedColor, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

        // 4. Symmetrie-basierte Klassifizierung (Zahlen vs. Treffer)
        let warpedContours = new cv.MatVector();
        let warpedHierarchy = new cv.Mat();
        cv.findContours(warped, warpedContours, warpedHierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

        const center = { x: WARP_SIZE / 2, y: WARP_SIZE / 2 };
        let hits = [];
        let numbers = [];
        let suspiciousPoints = [];

        // Schwerpunkt-Berechnung und Vorfilterung (Fläche)
        for (let i = 0; i < warpedContours.size(); ++i) {
            let cnt = warpedContours.get(i);
            let area = cv.contourArea(cnt);
            
            if (area > 20 && area < 2000) { // Rauschen und riesige Ringe ignorieren
                let M_cnt = cv.moments(cnt, false);
                let cx = M_cnt.m10 / M_cnt.m00;
                let cy = M_cnt.m01 / M_cnt.m00;
                suspiciousPoints.push({ x: cx, y: cy, area: area, cnt: cnt });
            }
        }

        const EPSILON_DIST = 35; // Pixel-Toleranz für Symmetrie-Prüfung

        suspiciousPoints.forEach(p1 => {
            let isSymmetric = false;
            
            // Punktspiegelung am Mittelpunkt
            let expectedX = 2 * center.x - p1.x;
            let expectedY = 2 * center.y - p1.y;

            // Prüfen, ob ein anderer Punkt in der Nähe der erwarteten symmetrischen Position existiert
            for (let p2 of suspiciousPoints) {
                if (p1 === p2) continue;
                let distToExpected = Math.hypot(p2.x - expectedX, p2.y - expectedY);
                
                if (distToExpected < EPSILON_DIST) {
                    isSymmetric = true;
                    break;
                }
            }

            if (isSymmetric) {
                numbers.push(p1);
                // Gelb: Ignorierte Zahlen
                cv.circle(warpedColor, new cv.Point(p1.x, p1.y), 15, new cv.Scalar(255, 255, 0, 255), 2);
            } else {
                hits.push(p1);
                // Rot: Validierte Treffer
                cv.circle(warpedColor, new cv.Point(p1.x, p1.y), 10, new cv.Scalar(255, 0, 0, 255), -1);
            }
        });

        // 5. Dynamisches Scoring
        let totalScore = 0;
        const maxRadius = WARP_SIZE / 2;
        
        // Blau: Rekonstruierte Ringe zeichnen (Visualisierung)
        for(let r = 1; r <= 10; r++) {
            cv.circle(warpedColor, new cv.Point(center.x, center.y), (maxRadius / 10) * r, new cv.Scalar(0, 200, 255, 255), 1);
        }

        hits.forEach(hit => {
            let distToCenter = Math.hypot(hit.x - center.x, hit.y - center.y);
            // Je näher am Zentrum, desto höher der Score (Max = 10)
            let score = 11 - Math.ceil((distToCenter / maxRadius) * 10);
            if(score < 0) score = 0;
            if(score > 10) score = 10;
            totalScore += score;
        });

        // Output anzeigen
        cv.imshow('canvasOutput', warpedColor);
        document.getElementById('scorePanel').style.display = 'block';
        document.getElementById('totalScore').innerText = totalScore;
        document.getElementById('hitCount').innerText = hits.length;

        // Speicher freigeben
        src.delete(); gray.delete(); enhanced.delete(); binary.delete(); contours.delete(); hierarchy.delete();
        warped.delete(); warpedColor.delete(); warpedContours.delete(); warpedHierarchy.delete(); M.delete();
    }
</script>
</body>
</html>

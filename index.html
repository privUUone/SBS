<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShot AI - High Precision</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        input, button { background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        button { background: #007acc; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        .workspace { position: relative; }
        canvas { max-width: 100%; border: 2px solid #333; background: #000; }
        .score-panel { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; pointer-events: none; }
        #status { margin-bottom: 15px; font-weight: bold; color: #ff9800; }
    </style>
</head>
<body>

    <h1>🎯 SmartShot AI (Warp & Dilation)</h1>
    <div id="status">Lade OpenCV.js...</div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" disabled>
        <label>Ringe: <input type="number" id="ringsInput" value="10" min="1" max="20" style="width: 50px;"></label>
        <button id="processBtn" disabled>Analyse starten</button>
    </div>

    <div class="workspace">
        <img id="imageSrc" style="display:none;">
        <canvas id="outputCanvas"></canvas>
        <div class="score-panel" id="scorePanel" style="display:none;">
            <div style="color: #4CAF50; font-size: 24px; font-weight: bold;">Score: <span id="totalScore">0</span></div>
            <div style="color: #aaa;">Treffer: <span id="hitCount">0</span></div>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()"></script>

    <script>
        let imgElement = document.getElementById('imageSrc');
        let inputElement = document.getElementById('imageInput');
        let processBtn = document.getElementById('processBtn');

        function onOpenCvReady() {
            document.getElementById('status').innerText = 'Bereit zur Analyse';
            document.getElementById('status').style.color = '#4CAF50';
            inputElement.disabled = false;
        }

        inputElement.addEventListener('change', (e) => {
            imgElement.src = URL.createObjectURL(e.target.files[0]);
        });

        imgElement.onload = () => { processBtn.disabled = false; };

        function orderPoints(pts) {
            let rect = new Array(4);
            let s = pts.map(p => p.x + p.y);
            let d = pts.map(p => p.x - p.y);
            rect[0] = pts[s.indexOf(Math.min(...s))]; // TL
            rect[2] = pts[s.indexOf(Math.max(...s))]; // BR
            rect[1] = pts[d.indexOf(Math.max(...d))]; // TR
            rect[3] = pts[d.indexOf(Math.min(...d))]; // BL
            return rect;
        }

        processBtn.addEventListener('click', () => {
            let src = cv.imread(imgElement);
            let gray = new cv.Mat();
            let bw = new cv.Mat();
            
            // --- 1. SCHUTZ DÜNNER LINIEN ---
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
            
            // Weichzeichner gegen Bildrauschen
            let ksize = new cv.Size(5, 5);
            cv.GaussianBlur(gray, gray, ksize, 0, 0, cv.BORDER_DEFAULT);

            // Sensibler Threshold (C=3 statt 10)
            cv.adaptiveThreshold(gray, bw, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 31, 3);

            // Dilation: Verdickt weiße Pixel (Linien), um Lücken zu schließen
            let M_dil = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
            cv.dilate(bw, bw, M_dil, new cv.Point(-1, -1), 1);

            // --- 2. TARGET DETECTION & WARP ---
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(bw, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let maxArea = 0, maxIdx = -1;
            for (let i = 0; i < contours.size(); i++) {
                let area = cv.contourArea(contours.get(i));
                if (area > maxArea) { maxArea = area; maxIdx = i; }
            }

            if (maxIdx === -1) { alert("Kein Zielring erkannt!"); return; }

            let rotatedRect = cv.minAreaRect(contours.get(maxIdx));
            let vertices = cv.RotatedRect.points(rotatedRect);
            let orderedPts = orderPoints([{x:vertices[0].x, y:vertices[0].y},{x:vertices[1].x, y:vertices[1].y},{x:vertices[2].x, y:vertices[2].y},{x:vertices[3].x, y:vertices[3].y}]);

            let warpSize = 800;
            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [orderedPts[0].x, orderedPts[0].y, orderedPts[1].x, orderedPts[1].y, orderedPts[2].x, orderedPts[2].y, orderedPts[3].x, orderedPts[3].y]);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, warpSize, 0, warpSize, warpSize, 0, warpSize]);
            let M_warp = cv.getPerspectiveTransform(srcTri, dstTri);
            
            let warpedOutput = new cv.Mat();
            cv.warpPerspective(src, warpedOutput, M_warp, new cv.Size(warpSize, warpSize));
            
            let warpedGray = new cv.Mat();
            cv.warpPerspective(gray, warpedGray, M_warp, new cv.Size(warpSize, warpSize));

            // --- 3. LOCHERKENNUNG ---
            let warpedBw = new cv.Mat();
            cv.adaptiveThreshold(warpedGray, warpedBw, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 25, 4);

            let n_rings = parseInt(document.getElementById('ringsInput').value);
            let center = warpSize / 2;
            let ringW = center / n_rings;

            let wContours = new cv.MatVector();
            cv.findContours(warpedBw, wContours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

            let score = 0, hits = 0;
            for (let i = 0; i < wContours.size(); i++) {
                let cnt = wContours.get(i);
                let area = cv.contourArea(cnt);
                if (area < 15 || area > 5000) continue; // Rauschfilter & Riesenobjekte

                let mom = cv.moments(cnt);
                let cx = mom.m10 / mom.m00, cy = mom.m01 / mom.m00;
                let dist = Math.sqrt((cx - center)**2 + (cy - center)**2);
                if (dist > center) continue;

                // Achsen-Check (Zahlen ignorieren)
                let tol = center * 0.06;
                if (Math.abs(cy - center) < tol || Math.abs(cx - center) < tol) {
                    cv.drawContours(warpedOutput, wContours, i, [255, 255, 0, 255], 2);
                } else {
                    cv.drawContours(warpedOutput, wContours, i, [255, 0, 0, 255], -1);
                    score += Math.max(0, n_rings - Math.floor(dist / ringW));
                    hits++;
                }
            }

            // Ringe zur Kontrolle zeichnen
            for(let j=1; j<=n_rings; j++) cv.circle(warpedOutput, new cv.Point(center, center), ringW*j, [0, 200, 255, 255], 1);

            cv.imshow('outputCanvas', warpedOutput);
            document.getElementById('totalScore').innerText = score;
            document.getElementById('hitCount').innerText = hits;
            document.getElementById('scorePanel').style.display = 'block';

            // Cleanup
            src.delete(); gray.delete(); bw.delete(); M_dil.delete(); contours.delete(); hierarchy.delete();
            srcTri.delete(); dstTri.delete(); M_warp.delete(); warpedOutput.delete(); warpedGray.delete(); warpedBw.delete(); wContours.delete();
        });
    </script>
</body>
</html>

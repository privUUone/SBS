<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan V23 - Hybrid Precision</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #app-container { width: 100%; max-width: 500px; }
        .card { background: #222; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #444; width: 100%; box-sizing: border-box;}
        video, canvas { width: 100%; border-radius: 10px; background: #000; margin-top: 5px; }
        .hidden { display: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; margin-top: 5px; }
        #scan-btn { background: #4caf50; color: white; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.8em; }
        .input-group { display: flex; flex-direction: column; }
        input { background: #333; color: white; border: 1px solid #555; padding: 4px; border-radius: 4px; }
        #status { text-align: center; color: #ffeb3b; margin: 8px 0; font-weight: bold; font-size: 0.9em; }
        h4 { margin: 10px 0 2px 0; font-size: 0.8em; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="card">
            <div class="input-grid">
                <div class="input-group"><label>Ringe (z.B. 6):</label><input type="number" id="ring-count" value="6"></div>
                <div class="input-group"><label>Hauptfarben:</label><input type="number" id="color-count" value="2"></div>
                <div class="input-group"><label>Ignorier-Breite:</label><input type="number" id="color-range" value="25"></div>
                <div class="input-group"><label>Loch-Farbbereich:</label><input type="number" id="hole-range" value="15"></div>
                <div class="input-group"><label>Mindest-Fläche %:</label><input type="number" id="min-area-pct" step="0.05" value="0.15"></div>
                <div class="input-group"><label>Rundheit (0.1-1.0):</label><input type="number" id="min-circ" step="0.1" value="0.6"></div>
            </div>
            <div id="status">Warte auf OpenCV...</div>
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas" class="hidden"></canvas>
        
        <div id="debug-area" class="hidden">
            <h4>1. Graustufen (Kamerasicht)</h4>
            <canvas id="gray-preview"></canvas>
            <h4>2. Analyse-Maske (Loch-Kandidaten)</h4>
            <canvas id="debug-canvas"></canvas>
        </div>
        
        <button id="scan-btn" disabled>Scan starten</button>
        <button id="reset-btn" class="hidden" style="background:#2196f3; color:white;">Neuer Scan</button>

        <div id="result-panel" class="card hidden" style="margin-top:10px;">
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const outputCanvas = document.getElementById('output-canvas');
        const debugCanvas = document.getElementById('debug-canvas');
        const grayCanvas = document.getElementById('gray-preview');
        const scanBtn = document.getElementById('scan-btn');
        const status = document.getElementById('status');

        let cvReady = false;
        function onOpenCvReady() {
            cvReady = true;
            status.innerText = "Bereit";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } })
                .then(s => { video.srcObject = s; video.onloadedmetadata = () => { scanBtn.disabled = false; }; });
        }

        scanBtn.addEventListener('click', async () => {
            if (!cvReady || video.videoWidth === 0) return;
            scanBtn.disabled = true; status.innerText = "Suche Scheibe...";
            await new Promise(r => setTimeout(r, 100));

            try {
                video.width = video.videoWidth; video.height = video.videoHeight;
                let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                new cv.VideoCapture(video).read(src);

                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                
                // PHASE 1: Kreissuche via Hough (wie in deinem V3)
                let blurred = new cv.Mat();
                cv.GaussianBlur(gray, blurred, new cv.Size(7, 7), 0);
                let circles = new cv.Mat();
                cv.HoughCircles(blurred, circles, cv.HOUGH_GRADIENT, 1, 100, 50, 35, 100, 0);

                if (circles.cols === 0) throw new Error("Keine runde Scheibe gefunden!");

                let tx = circles.data32F[0];
                let ty = circles.data32F[1];
                let tr = circles.data32F[2];

                // PHASE 2: Normalisierter Crop (512x512)
                let rect = new cv.Rect(tx - tr, ty - tr, tr * 2, tr * 2);
                rect.x = Math.max(0, rect.x); rect.y = Math.max(0, rect.y);
                rect.width = Math.min(src.cols - rect.x, rect.width); rect.height = Math.min(src.rows - rect.y, rect.height);
                
                let target = new cv.Mat();
                cv.resize(src.roi(rect), target, new cv.Size(512, 512), 0, 0, cv.INTER_AREA);
                let gray512 = new cv.Mat();
                cv.cvtColor(target, gray512, cv.COLOR_RGBA2GRAY, 0);
                cv.imshow('gray-preview', gray512); // Graubild anzeigen

                // PHASE 3: Histogramm & Farben filtern
                let mask = cv.Mat.zeros(512, 512, cv.CV_8U);
                cv.circle(mask, new cv.Point(256, 256), 250, [255, 255, 255, 255], -1);
                let totalPx = Math.PI * 250 * 250;

                let srcVec = new cv.MatVector(); srcVec.push_back(gray512);
                let hist = new cv.Mat();
                cv.calcHist(srcVec, [0], mask, hist, [256], [0, 256]);
                let tempHist = Array.from(hist.data32F);

                let cardColors = parseInt(document.getElementById('color-count').value);
                let colorRange = parseInt(document.getElementById('color-range').value);
                for(let c = 0; c < cardColors; c++) {
                    let maxVal = 0, maxIdx = 0;
                    for(let i = 0; i < 256; i++) if(tempHist[i] > maxVal) { maxVal = tempHist[i]; maxIdx = i; }
                    for(let i = Math.max(0, maxIdx - colorRange); i <= Math.min(255, maxIdx + colorRange); i++) tempHist[i] = 0;
                }

                // PHASE 4: Räumliche Analyse
                let isHoleBin = new Array(256).fill(false);
                let holeRange = parseInt(document.getElementById('hole-range').value);
                let sens = 0.002; // Fest verdrahtet für Stabilität
                for(let i = 0; i <= (256 - holeRange); i++) {
                    let sum = 0; for(let j = 0; j < holeRange; j++) sum += tempHist[i+j];
                    if ((sum / totalPx) > sens) { for(let j = 0; j < holeRange; j++) isHoleBin[i+j] = true; }
                }

                let holeMask = cv.Mat.zeros(512, 512, cv.CV_8U);
                for(let i=0; i<256; i++) {
                    if(isHoleBin[i]) {
                        let tM = new cv.Mat();
                        let low = new cv.Mat(512, 512, cv.CV_8U, [i, 0, 0, 0]);
                        let high = new cv.Mat(512, 512, cv.CV_8U, [i, 0, 0, 0]);
                        cv.inRange(gray512, low, high, tM);
                        cv.bitwise_or(holeMask, tM, holeMask);
                        tM.delete(); low.delete(); high.delete();
                    }
                }
                cv.bitwise_and(holeMask, mask, holeMask);
                cv.imshow('debug-canvas', holeMask);

                let holeContours = new cv.MatVector();
                let hH = new cv.Mat();
                cv.findContours(holeMask, holeContours, hH, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let treffer = [];
                let ringCount = parseInt(document.getElementById('ring-count').value);
                let minArea = parseFloat(document.getElementById('min-area-pct').value) / 100;
                let minCirc = parseFloat(document.getElementById('min-circ').value);
                let ringWidth = 250 / ringCount;

                for (let i = 0; i < holeContours.size(); ++i) {
                    let cnt = holeContours.get(i);
                    let area = cv.contourArea(cnt);
                    let perimeter = cv.arcLength(cnt, true);
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);

                    // FILTER LOGIK
                    if (area > (totalPx * minArea) && circularity > minCirc) {
                        let M = cv.moments(cnt);
                        let cx = M.m10/M.m00, cy = M.m01/M.m00;
                        let dist = Math.hypot(cx - 256, cy - 256);

                        // Spezial-Check: Wenn das Objekt riesig ist und im Zentrum sitzt -> Wahrscheinlich das weiße Zentrum
                        if (dist < 30 && area > (totalPx * 0.05)) continue; 

                        let punkte = 10 - Math.floor(dist / ringWidth);
                        treffer.push(Math.max(10 - ringCount + 1, Math.min(10, punkte)));
                        cv.circle(target, new cv.Point(cx, cy), 15, [0, 255, 0, 255], 3);
                    }
                }

                cv.imshow('output-canvas', target);
                video.classList.add('hidden');
                outputCanvas.classList.remove('hidden');
                document.getElementById('debug-area').classList.remove('hidden');
                document.getElementById('result-panel').classList.remove('hidden');
                zeige(treffer);
                status.innerText = "Ergebnis berechnet";
                document.getElementById('reset-btn').classList.remove('hidden');

                // Cleanup
                [src, gray, blurred, circles, target, gray512, mask, hist, holeMask, holeContours, hH].forEach(m => { if(m) m.delete(); });
            } catch (e) {
                status.innerText = "Fehler: " + e.message;
                scanBtn.disabled = false;
            }
        });

        function zeige(t) {
            const l = document.getElementById('results-list');
            l.innerHTML = ""; let s = 0;
            t.sort((a,b) => b-a).forEach(p => { 
                l.innerHTML += `<div class="result-row"><span>Ring ${p}</span><span>1x</span></div>`;
                s += p;
            });
            l.innerHTML += `<div class="result-row" style="font-weight:bold; color:#4caf50; font-size:1.2em;"><span>Gesamt</span><span>${s}</span></div>`;
        }
        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>

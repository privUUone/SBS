<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schießscheiben Scanner</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { margin-bottom: 10px; }
        #app-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        #camera-view {
            width: 100%;
            border-radius: 12px;
            background-color: #000;
            display: block;
        }
        /* Unsichtbares Canvas für die Bildaufnahme */
        #hidden-canvas { display: none; }
        
        #scan-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #scan-btn:hover { background-color: #d32f2f; }
        #scan-btn:disabled { background-color: #555; cursor: not-allowed; }

        /* Auswertungspanel */
        #result-panel {
            display: none;
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #444;
        }
        .result-row:last-child { border-bottom: none; font-weight: bold; font-size: 1.2em; color: #4caf50; }
        #reset-btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Scheiben-Scanner</h1>
    <div id="app-container">
        <video id="camera-view" autoplay playsinline></video>
        <canvas id="hidden-canvas"></canvas>
        
        <button id="scan-btn" disabled>Lade OpenCV...</button>

        <div id="result-panel">
            <h2>Auswertung</h2>
            <div id="results-list"></div>
            <button id="reset-btn">Neuer Scan</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('hidden-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const resultPanel = document.getElementById('result-panel');
        const resultsList = document.getElementById('results-list');
        const resetBtn = document.getElementById('reset-btn');

        // OpenCV Lade-Status
        let cvReady = false;
        function onOpenCvReady() {
            cvReady = true;
            scanBtn.innerText = "Scheibe Scannen";
            scanBtn.disabled = false;
        }

        // Kamera starten
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // Nutzt die Rückkamera auf Handys
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Fehler beim Kamerazugriff: " + err);
            }
        }

        startCamera();

        // Scan Button Logik
        scanBtn.addEventListener('click', () => {
            // 1. Bild in Originalauflösung auf Canvas zeichnen
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. UI umstellen
            video.style.display = 'none';
            scanBtn.style.display = 'none';
            
            // 3. Bildauswertung starten
            processImage();
        });

        // Reset Button Logik
        resetBtn.addEventListener('click', () => {
            resultPanel.style.display = 'none';
            video.style.display = 'block';
            scanBtn.style.display = 'block';
        });

        // --- BILDVERARBEITUNG ---
        function processImage() {
            if (!cvReady) return;

            /* Hier würde die ECHTE OpenCV.js Logik stehen. 
               Da diese stark von Licht, Kontrast und der spezifischen 
               Zielscheibe abhängt, ist hier die mathematische Simulation 
               sowie die Erklärung der Schritte implementiert.
            */
            
            // Schritt 1: Bild einlesen
            // let src = cv.imread(canvas);
            // let gray = new cv.Mat();
            // cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);

            // Schritt 2: Zentrum der Scheibe finden (HoughCircles)
            // cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, ...);
            
            // Schritt 3: Einschusslöcher finden (Blob Detection oder Thresholding)
            // cv.threshold(gray, binary, 100, 255, cv.THRESH_BINARY_INV);
            
            // --- SIMULIERTE ERGEBNISSE FÜR DEMO-ZWECKE ---
            // In der Realität werden diese Treffer durch die Distanz 
            // zum errechneten Mittelpunkt der Scheibe ermittelt.
            const ermittelteTreffer = [10, 10, 9, 8, 8, 5]; 
            zeigeAuswertung(ermittelteTreffer);
        }

        function zeigeAuswertung(trefferArray) {
            // Treffer zählen
            const punkteZaehler = { 10:0, 9:0, 8:0, 7:0, 6:0, 5:0, 4:0, 3:0, 2:0, 1:0 };
            let gesamtPunkte = 0;

            trefferArray.forEach(punkt => {
                if(punkteZaehler[punkt] !== undefined) punkteZaehler[punkt]++;
                gesamtPunkte += punkt;
            });

            // UI aufbauen
            resultsList.innerHTML = '';
            for (let i = 10; i >= 1; i--) {
                if (punkteZaehler[i] > 0) {
                    const row = document.createElement('div');
                    row.className = 'result-row';
                    row.innerHTML = `<span>${i}er Ring:</span> <span>${punkteZaehler[i]}x getroffen</span>`;
                    resultsList.appendChild(row);
                }
            }

            const totalRow = document.createElement('div');
            totalRow.className = 'result-row';
            totalRow.innerHTML = `<span>Gesamtpunktzahl:</span> <span>${gesamtPunkte}</span>`;
            resultsList.appendChild(totalRow);

            resultPanel.style.display = 'block';
        }
    </script>
</body>
</html>

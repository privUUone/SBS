<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan V7 - Peak Analytics</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        #app-container { width: 100%; max-width: 480px; }
        .controls { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        input { width: 50px; padding: 8px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; font-weight: bold; }
        video, canvas { width: 100%; border-radius: 15px; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #output-canvas, #hidden-canvas { display: none; }
        button { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #scan-btn { background: #ff3d00; color: white; }
        #scan-btn:active { transform: scale(0.98); }
        #reset-btn { background: #0081ff; color: white; display: none; }
        #status { text-align: center; margin: 12px; color: #ffd600; font-size: 0.9em; min-height: 1.2em; }
        #result-panel { display: none; background: #1a1a1a; padding: 20px; border-radius: 15px; margin-top: 10px; border: 1px solid #333; width: 100%; box-sizing: border-box; }
        .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .total { font-weight: bold; color: #00e676; font-size: 1.3em; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="controls">
            <label>Ringe (Zentrum=10):</label>
            <input type="number" id="ring-count" value="6">
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="hidden-canvas"></canvas>
        
        <div id="status">Warte auf OpenCV...</div>
        <button id="scan-btn" disabled>Scan auslösen</button>
        <button id="reset-btn">Zurück zur Kamera</button>

        <div id="result-panel">
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const outputCanvas = document.getElementById('output-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const resetBtn = document.getElementById('reset-btn');
        const status = document.getElementById('status');
        const resultsList = document.getElementById('results-list');

        function onOpenCvReady() {
            status.innerText = "System bereit";
            scanBtn.disabled = false;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 720 } })
                .then(s => video.srcObject = s);
        }

        scanBtn.addEventListener('click', () => {
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            hiddenCanvas.getContext('2d').drawImage(video, 0, 0);
            video.style.display = 'none';
            scanBtn.style.display = 'none';
            status.innerText = "Histogramm-Cluster-Analyse läuft...";
            outputCanvas.style.display = 'block';
            setTimeout(processImage, 100);
        });

        resetBtn.addEventListener('click', () => { location.reload(); });

        function processImage() {
            let src = cv.imread(hiddenCanvas);
            let dst = new cv.Mat();
            // Downscale für Performance, aber hoch genug für Details
            cv.resize(src, dst, new cv.Size(600, Math.round(600 * src.rows / src.cols)), 0, 0, cv.INTER_AREA);
            
            let gray = new cv.Mat();
            cv.cvtColor(dst, gray, cv.COLOR_RGBA2GRAY, 0);

            // 1. KREISERKENNUNG (Bewährte Hough-Parameter)
            let blurred = new cv.Mat();
            cv.GaussianBlur(gray, blurred, new cv.Size(9, 9), 2);
            let circles = new cv.Mat();
            cv.HoughCircles(blurred, circles, cv.HOUGH_GRADIENT, 1, 100, 50, 35, 100, 0);

            if (circles.cols === 0) {
                status.innerText = "Keine Scheibe erkannt. Bitte näher ran!";
                resetBtn.style.display = "block";
                return;
            }

            let tx = circles.data32F[0], ty = circles.data32F[1], tr = circles.data32F[2];

            // 2. HISTOGRAMM & PEAK-FINDING
            let mask = cv.Mat.zeros(gray.rows, gray.cols, cv.CV_8U);
            cv.circle(mask, new cv.Point(tx, ty), tr, [255, 255, 255, 255], -1);

            let hist = new cv.Mat();
            let maskVec = new cv.MatVector(); maskVec.push_back(mask);
            cv.calcHist(maskVec, [0], mask, hist, [256], [0, 256]);

            // Histogramm glätten (Moving Average)
            let smoothedHist = [];
            for (let i = 0; i < 256; i++) {
                let sum = 0, count = 0;
                for (let j = -4; j <= 4; j++) {
                    if (i + j >= 0 && i + j < 256) {
                        sum += hist.data32F[i + j];
                        count++;
                    }
                }
                smoothedHist.push(sum / count);
            }

            // Peaks finden (Glockenkurven-Zentren)
            let peaks = [];
            for (let i = 2; i < 254; i++) {
                if (smoothedHist[i] > smoothedHist[i-1] && smoothedHist[i] > smoothedHist[i+1]) {
                    if (smoothedHist[i] > (tr * tr * 0.001)) { // Mindestgröße für Peak
                        peaks.push({val: i, count: smoothedHist[i]});
                    }
                }
            }

            // Wir sortieren Peaks nach Häufigkeit. 
            // Papier (hell) und ggf. Schwarz (dunkel) sind die größten.
            peaks.sort((a, b) => b.count - a.count);

            // Den "Loch-Peak" finden: 
            // Er ist meistens seltener als das Papier, aber vorhanden.
            // Wir nehmen den Peak, der nicht der hellste (Papier) ist und eine "Loch-typische" Helligkeit hat.
            let holePeak = peaks.find(p => p.val < 180 && p.val > 20) || peaks[peaks.length-1];

            // 3. SEGMENTIERUNG & RÄUMLICHE KONSISTENZ
            let holeMask = new cv.Mat();
            // Bereich um den Peak (Glockenkurve ca. +/- 15 Einheiten)
            cv.inRange(gray, new cv.Mat(gray.rows, gray.cols, gray.type(), [holePeak.val - 15]), 
                             new cv.Mat(gray.rows, gray.cols, gray.type(), [holePeak.val + 15]), holeMask);
            cv.bitwise_and(holeMask, mask, holeMask);

            // Morphologische Reinigung: Kleine isolierte Pixel entfernen, Löcher schließen
            let kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(3, 3));
            cv.morphologyEx(holeMask, holeMask, cv.MORPH_OPEN, kernel);

            let labels = new cv.Mat();
            let stats = new cv.Mat();
            let centroids = new cv.Mat();
            let numComponents = cv.connectedComponentsWithStats(holeMask, labels, stats, centroids);

            let treffer = [];
            let numRings = parseInt(document.getElementById('ring-count').value);
            let ringW = tr / numRings;
            let holeAreas = [];

            for (let i = 1; i < numComponents; i++) {
                let area = stats.intAt(i, cv.CC_STAT_AREA);
                let cx = centroids.data64F[i * 2];
                let cy = centroids.data64F[i * 2 + 1];
                let dist = Math.hypot(cx - tx, cy - ty);

                // Filter: Muss innerhalb der Scheibe liegen und eine Mindestgröße haben
                if (dist < tr && area > 10) {
                    // Ignoriere Zentrum, falls es fälschlich als Loch erkannt wird
                    if (dist < ringW * 0.4 && area > (ringW * ringW * 0.4)) continue;
                    holeAreas.push({area, dist, cx, cy});
                }
            }

            // Multi-Treffer Logik
            if (holeAreas.length > 0) {
                holeAreas.sort((a, b) => a.area - b.area);
                let medianArea = holeAreas[Math.floor(holeAreas.length / 2)].area;

                holeAreas.forEach(h => {
                    let shots = Math.max(1, Math.round(h.area / medianArea));
                    let p = 10 - Math.floor(h.dist / ringW);
                    p = Math.max(10 - numRings + 1, Math.min(10, p));

                    for (let s = 0; s < shots; s++) treffer.push(p);

                    cv.circle(dst, new cv.Point(h.cx, h.cy), 4, [255, 0, 0, 255], -1);
                    cv.putText(dst, p.toString(), new cv.Point(h.cx + 5, h.cy - 5), 1, 1.3, [255, 255, 0, 255], 2);
                });
            }

            cv.circle(dst, new cv.Point(tx, ty), tr, [0, 255, 0, 255], 2);
            cv.imshow('output-canvas', dst);
            zeigeErgebnis(treffer);
            
            status.innerText = "Analyse abgeschlossen";
            resetBtn.style.display = "block";

            // Cleanup
            [src, dst, gray, blurred, circles, mask, hist, holeMask, labels, stats, centroids, kernel].forEach(m => m.delete());
            maskVec.delete();
        }

        function zeigeErgebnis(treffer) {
            resultsList.innerHTML = "";
            let sum = 0, counts = {};
            treffer.forEach(p => { counts[p] = (counts[p] || 0) + 1; sum += p; });
            Object.keys(counts).sort((a,b) => b-a).forEach(p => {
                resultsList.innerHTML += `<div class="result-row"><span>${p}er Ring:</span><span>${counts[p]}x</span></div>`;
            });
            resultsList.innerHTML += `<div class="result-row total"><span>Gesamt: ${sum} Punkte</span></div>`;
            document.getElementById('result-panel').style.display = 'block';
        }
    </script>
</body>
</html>

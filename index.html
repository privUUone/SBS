<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schussbild Auswertung</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 2rem 1rem; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.5;
            margin: 0;
        }

        .container { 
            max-width: 800px; 
            margin: auto; 
            background: var(--surface); 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); 
        }

        h1 { margin-top: 0; font-size: 1.75rem; color: var(--text); }
        
        .status-box {
            padding: 1rem;
            border-radius: 8px;
            background: #fef2f2;
            color: #991b1b;
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-box.ready { background: #f0fdf4; color: #166534; }

        .controls { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; 
            padding: 1.5rem; 
            background: var(--bg); 
            border: 1px solid var(--border);
            border-radius: 8px; 
            margin-bottom: 1.5rem;
        }

        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        
        label { font-size: 0.875rem; font-weight: 600; color: var(--text-light); }
        
        input[type="file"] { font-size: 0.875rem; }
        
        input[type="number"] { 
            padding: 0.5rem; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            width: 100%;
            box-sizing: border-box;
        }

        button { 
            padding: 0.75rem 1.5rem; 
            font-weight: 600;
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: background-color 0.2s;
            grid-column: 1 / -1; /* Button streckt sich über volle Breite */
        }
        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; opacity: 0.7; }

        .canvas-container {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            background: #fff;
            text-align: center;
        }

        canvas { 
            max-width: 100%; 
            height: auto; 
            display: block; 
            margin: 0 auto;
            border-radius: 4px;
        }

        /* Simpler Lade-Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid currentColor;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Schussbild Auswertung</h1>
    
    <div id="statusBox" class="status-box">
        <span id="spinner" class="spinner"></span>
        <span id="statusText">OpenCV.js wird geladen... Dieser Vorgang kann einige Sekunden dauern.</span>
    </div>
    
    <div class="controls">
        <div class="control-group">
            <label for="imageInput">Schussbild hochladen</label>
            <input type="file" id="imageInput" accept="image/*" disabled>
        </div>
        <div class="control-group">
            <label for="rings">Anzahl der Ringe (z.B. 5)</label>
            <input type="number" id="rings" value="5" min="1" max="10" disabled>
        </div>
        <button id="scanButton" disabled>Scannen & Auswerten</button>
    </div>

    <div class="canvas-container">
        <canvas id="outputCanvas"></canvas>
    </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

<script type="text/javascript">
    let imgElement = document.getElementById('imageInput');
    let scanButton = document.getElementById('scanButton');
    let outputCanvas = document.getElementById('outputCanvas');
    let statusBox = document.getElementById('statusBox');
    let statusText = document.getElementById('statusText');
    let spinner = document.getElementById('spinner');

    function onOpenCvReady() {
        statusBox.className = 'status-box ready';
        spinner.style.display = 'none';
        statusText.innerText = 'System bereit! Lade ein Bild hoch und starte den Scan.';
        imgElement.disabled = false;
        document.getElementById('rings').disabled = false;
    }

    imgElement.addEventListener('change', (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(event) {
            let img = new Image();
            img.onload = function() {
                let ctx = outputCanvas.getContext('2d');
                // Canvas Größe ans Bild anpassen für bessere Auflösung
                outputCanvas.width = img.width;
                outputCanvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                scanButton.disabled = false;
            }
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    scanButton.addEventListener('click', () => {
        // Kurze Verzögerung, damit der Button-Klick visuell spürbar ist
        scanButton.innerText = "Wertet aus...";
        scanButton.disabled = true;
        setTimeout(() => {
            processImage();
            scanButton.innerText = "Scannen & Auswerten";
            scanButton.disabled = false;
        }, 50);
    });

    function processImage() {
        let src = cv.imread(outputCanvas);
        let gray = new cv.Mat();
        let bw = new cv.Mat();
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();

        // WICHTIG: Try-Finally Block, damit der Speicher bei Fehlern IMMER geleert wird!
        try {
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
            cv.adaptiveThreshold(gray, bw, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
            cv.findContours(bw, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

            let targetCenter = { x: 0, y: 0 };
            let maxRadius = 0;
            let mainCircleIdx = -1;

            // 1. Äußersten Ring finden
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                
                if (area > 1000) {
                    let circle = cv.minEnclosingCircle(cnt);
                    let circleArea = Math.PI * circle.radius * circle.radius;
                    
                    if (circleArea > 0 && (area / circleArea > 0.75)) { 
                        if (circle.radius > maxRadius) {
                            maxRadius = circle.radius;
                            targetCenter = circle.center;
                            mainCircleIdx = i;
                        }
                    }
                }
                cnt.delete(); // <-- HIER WAR DER MEMORY LEAK!
            }

            if (mainCircleIdx === -1) {
                alert("Zielscheibe konnte nicht gefunden werden. Bitte Kontrast prüfen.");
                return; // Geht dank 'finally' ohne Memory Leak raus
            }

            let numRings = parseInt(document.getElementById('rings').value) || 5;

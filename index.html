<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OpenCV Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .card { background: white; max-width: 800px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; height: auto; border: 1px solid #ccc; margin-top: 10px; }
        #errorLog { color: red; background: #ffdada; padding: 10px; display: none; margin-top: 10px; border-radius: 5px; text-align: left; font-family: monospace; }
        .status { font-weight: bold; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Histogramm-Check</h1>
    <div id="status" class="status">⏳ Lade OpenCV.js...</div>
    <div id="errorLog"></div>

    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()" disabled>Bild auswählen</button>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
        <div>
            <small>Original</small><br>
            <canvas id="canvasInput"></canvas>
        </div>
        <div>
            <small>Optimiert</small><br>
            <canvas id="canvasOutput"></canvas>
        </div>
    </div>
</div>

<script>
    // Fehler auf dem Bildschirm anzeigen statt nur in der Konsole
    function showError(msg) {
        const errDiv = document.getElementById('errorLog');
        errDiv.style.display = 'block';
        errDiv.innerHTML += "> " + msg + "<br>";
        console.error(msg);
    }

    // Callback wenn OpenCV geladen ist
    var cvReady = false;
    function onOpenCvReady() {
        cvReady = true;
        document.getElementById('status').innerHTML = "✅ OpenCV ist bereit!";
        document.getElementById('status').style.color = "green";
        document.getElementById('uploadBtn').disabled = false;
    }

    // Falls das Script nicht lädt
    window.onerror = function(message) {
        showError("Script-Fehler: " + message);
    };

    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('canvasInput');
                // Maximale Größe begrenzen (Performance)
                const scale = Math.min(1, 800 / Math.max(img.width, img.height));
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                processImage();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function processImage() {
        if (!cvReady) {
            showError("OpenCV ist noch nicht geladen!");
            return;
        }

        try {
            let src = cv.imread('canvasInput');
            let dst = new cv.Mat();
            
            // Konvertiere zu Graustufen für eine einfache Histogramm-Egalisierung
            // (Das ist sicherer als die YUV-Variante für den ersten Test)
            cv.cvtColor(src, src, cv.COLOR_RGBA2GRAY);
            cv.equalizeHist(src, dst);
            
            cv.imshow('canvasOutput', dst);
            
            src.delete(); 
            dst.delete();
        } catch (err) {
            showError("OpenCV Fehler: " + cv.exceptionFromPtr(err).msg);
        }
    }
</script>

<script async src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.9.0-release.3/dist/opencv.js" 
        onload="onOpenCvReady();" 
        onerror="showError('Konnte OpenCV.js von CDN nicht laden. Prüfe deine Internetverbindung oder Firewall.');"></script>

</body>
</html>

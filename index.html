<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan Ultra-Light</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        #app-container { width: 100%; max-width: 450px; }
        .controls { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 50px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; text-align: center; }
        video, canvas { width: 100%; border-radius: 12px; background: #000; display: block; }
        #output-canvas, #hidden-canvas { display: none; }
        button { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #scan-btn { background: #e53935; color: white; }
        #reset-btn { background: #2196f3; color: white; display: none; }
        #status { text-align: center; margin: 10px; color: #ffeb3b; min-height: 20px; }
        #result-panel { display: none; background: #1e1e1e; padding: 15px; border-radius: 12px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; }
        .total { font-weight: bold; color: #4caf50; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="controls">
            <label>Ringe (z.B. 6):</label>
            <input type="number" id="ring-count" value="6">
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="hidden-canvas"></canvas>
        
        <div id="status">Warte auf OpenCV...</div>
        <button id="scan-btn" disabled>Bereit</button>
        <button id="reset-btn">Neuer Scan</button>

        <div id="result-panel">
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const outputCanvas = document.getElementById('output-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const resetBtn = document.getElementById('reset-btn');
        const status = document.getElementById('status');
        const resultsList = document.getElementById('results-list');

        function onOpenCvReady() {
            status.innerText = "Kamera wird gestartet...";
            scanBtn.disabled = false;
            startCamera();
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            status.innerText = "Bereit zum Scannen";
        }

        scanBtn.addEventListener('click', () => {
            const ctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            video.style.display = 'none';
            scanBtn.style.display = 'none';
            status.innerText = "Analysiere... (ca. 2-5 Sek)";
            outputCanvas.style.display = 'block';

            setTimeout(processImage, 100);
        });

        resetBtn.addEventListener('click', () => { location.reload(); });

        function processImage() {
            let src = cv.imread(hiddenCanvas);
            
            // --- SCHRITT 1: BILD VERKLEINERN (Wichtig für Speed!) ---
            let dst = new cv.Mat();
            let dsize = new cv.Size(600, Math.round(600 * src.rows / src.cols));
            cv.resize(src, dst, dsize, 0, 0, cv.INTER_AREA);
            
            let gray = new cv.Mat();
            cv.cvtColor(dst, gray, cv.COLOR_RGBA2GRAY, 0);

            // --- SCHRITT 2: SCHEIBE FINDEN (Über Konturen, nicht Hough) ---
            let thresh = new cv.Mat();
            cv.threshold(gray, thresh, 100, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let target = null;
            let maxArea = 0;

            // Suche die größte runde Fläche (die Scheibe)
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area > maxArea) {
                    let rect = cv.boundingRect(cnt);
                    let ratio = rect.width / rect.height;
                    if (ratio > 0.8 && ratio < 1.2) { // Muss halbwegs quadratisch/rund sein
                        maxArea = area;
                        target = { x: rect.x + rect.width/2, y: rect.y + rect.height/2, r: (rect.width + rect.height)/4 };
                    }
                }
            }

            if (!target) {
                status.innerText = "Keine Scheibe gefunden!";
                resetBtn.style.display = "block";
                dst.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
                return;
            }

            // --- SCHRITT 3: LÖCHER FINDEN ---
            let edges = new cv.Mat();
            cv.Canny(gray, edges, 50, 150);
            let kernel = cv.Mat.ones(3, 3, cv.CV_8U);
            cv.dilate(edges, edges, kernel);

            let holeContours = new cv.MatVector();
            cv.findContours(edges, holeContours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let foundHoles = [];
            let numRings = parseInt(document.getElementById('ring-count').value);
            let ringW = target.r / numRings;

            for (let i = 0; i < holeContours.size(); ++i) {
                let cnt = holeContours.get(i);
                let area = cv.contourArea(cnt);
                
                // Filter: Lochgröße im Verhältnis zur Scheibe
                if (area > (target.r * target.r * 0.005) && area < (target.r * target.r * 0.1)) {
                    let M = cv.moments(cnt);
                    let cx = M.m10 / M.m00;
                    let cy = M.m01 / M.m00;
                    let dist = Math.hypot(cx - target.x, cy - target.y);

                    if (dist < target.r) {
                        foundHoles.push({ area: area, dist: dist, cx: cx, cy: cy });
                    }
                }
            }

            // --- SCHRITT 4: MULTI-TREFFER LOGIK ---
            let treffer = [];
            if (foundHoles.length > 0) {
                foundHoles.sort((a,b) => a.area - b.area);
                let avgArea = foundHoles[Math.floor(foundHoles.length / 2)].area; // Median

                foundHoles.forEach(h => {
                    let shots = Math.max(1, Math.round(h.area / avgArea));
                    let p = 10 - Math.floor(h.dist / ringW);
                    p = Math.max(10 - numRings + 1, Math.min(10, p));
                    
                    for(let s=0; s<shots; s++) treffer.push(p);

                    // Zeichnen
                    cv.circle(dst, new cv.Point(h.cx, h.cy), 5, [255, 0, 0, 255], -1);
                    cv.putText(dst, p.toString(), new cv.Point(h.cx+5, h.cy-5), 1, 1.2, [255, 255, 0, 255], 2);
                });
            }

            cv.circle(dst, new cv.Point(target.x, target.y), target.r, [0, 255, 0, 255], 2);
            cv.imshow('output-canvas', dst);
            
            zeigeErgebnis(treffer);
            status.innerText = "Analyse fertig";
            resetBtn.style.display = "block";

            // SPEICHER FREIGEBEN
            src.delete(); dst.delete(); gray.delete(); thresh.delete(); 
            edges.delete(); kernel.delete(); contours.delete(); 
            holeContours.delete(); hierarchy.delete();
        }

        function zeigeErgebnis(treffer) {
            resultsList.innerHTML = "";
            let sum = 0;
            let counts = {};
            treffer.forEach(p => { counts[p] = (counts[p] || 0) + 1; sum += p; });
            Object.keys(counts).sort((a,b) => b-a).forEach(p => {
                resultsList.innerHTML += `<div class="result-row"><span>${p}er Ring:</span><span>${counts[p]}x</span></div>`;
            });
            resultsList.innerHTML += `<div class="result-row total"><span>Gesamt:</span><span>${sum} Punkte</span></div>`;
            document.getElementById('result-panel').style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TargetScan V17 - Sliding Window</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        #app-container { width: 100%; max-width: 500px; }
        .card { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #444; width: 100%; box-sizing: border-box; }
        video, canvas { width: 100%; border-radius: 10px; background: #000; display: block; }
        #output-canvas { display: none; }
        button { width: 100%; padding: 20px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; border: none; }
        #scan-btn { background: #e53935; color: white; }
        #scan-btn:disabled { background: #444; color: #888; }
        #status { text-align: center; color: #ffeb3b; margin: 10px 0; font-weight: bold; min-height: 1.5em; }
        .res { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label>Ringe:</label> <input type="number" id="ring-count" value="10" style="width:45px; padding:5px;">
                <label>Kartenfarben:</label> <input type="number" id="color-count" value="2" style="width:45px; padding:5px;">
            </div>
            <div id="status">Warte auf OpenCV...</div>
        </div>

        <video id="camera-view" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        
        <button id="scan-btn" disabled>Scan starten</button>
        <button id="reset-btn" style="display:none; background:#2196f3; color:white;">Neu starten</button>

        <div id="result-panel" class="card" style="display:none;">
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const outputCanvas = document.getElementById('output-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const status = document.getElementById('status');

        let cvReady = false;
        function onOpenCvReady() {
            cvReady = true;
            status.innerText = "Kamera wird geladen...";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } })
                .then(s => { 
                    video.srcObject = s;
                    video.onloadedmetadata = () => {
                        status.innerText = "System bereit";
                        scanBtn.disabled = false;
                    };
                }).catch(e => {
                    status.innerText = "Kamera-Zugriff verweigert!";
                });
        }

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        scanBtn.addEventListener('click', async () => {
            if (!cvReady || video.videoWidth === 0) return;
            
            scanBtn.disabled = true;
            status.innerText = "Schritt 1: Karte finden...";
            await sleep(100);

            try {
                // FIX: Video-Attribute explizit setzen für OpenCV VideoCapture
                video.width = video.videoWidth;
                video.height = video.videoHeight;
                let vW = video.width;
                let vH = video.height;

                let src = new cv.Mat(vH, vW, cv.CV_8UC4);
                let cap = new cv.VideoCapture(video);
                cap.read(src);

                // 2. Kreis-Ortung
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                let blurred = new cv.Mat();
                cv.GaussianBlur(gray, blurred, new cv.Size(9, 9), 2);
                let circles = new cv.Mat();
                cv.HoughCircles(blurred, circles, cv.HOUGH_GRADIENT, 1, 100, 50, 40, 100, vH/2);

                if (circles.cols === 0) throw new Error("Kein Kreis gefunden!");
                let tx = circles.data32F[0], ty = circles.data32F[1], tr = circles.data32F[2];

                // 3. Crop & Square (512x512)
                let rect = new cv.Rect(tx - tr, ty - tr, tr * 2, tr * 2);
                rect.x = Math.max(0, rect.x); rect.y = Math.max(0, rect.y);
                rect.width = Math.min(src.cols - rect.x, rect.width);
                rect.height = Math.min(src.rows - rect.y, rect.height);
                
                let cropped = src.roi(rect);
                let target = new cv.Mat();
                cv.resize(cropped, target, new cv.Size(512, 512), 0, 0, cv.INTER_AREA);

                // 4. Histogramm & sliding Window
                let gray512 = new cv.Mat();
                cv.cvtColor(target, gray512, cv.COLOR_RGBA2GRAY, 0);
                
                let mask = cv.Mat.zeros(512, 512, cv.CV_8U);
                cv.circle(mask, new cv.Point(256, 256), 250, [255, 255, 255, 255], -1);
                let totalPx = Math.PI * 250 * 250; 

                let srcVec = new cv.MatVector(); 
                srcVec.push_back(gray512);
                let hist = new cv.Mat();
                cv.calcHist(srcVec, [0], mask, hist, [256], [0, 256]);
                
                let histData = Array.from(hist.data32F);
                let tempHist = [...histData]; 

                // Schritt A: Hauptfarben (Karte) eliminieren
                let cardCount = parseInt(document.getElementById('color-count').value);
                for(let c = 0; c < cardCount; c++) {
                    let maxVal = 0, maxIdx = 0;
                    for(let i = 0; i < 256; i++) {
                        if(tempHist[i] > maxVal) { maxVal = tempHist[i]; maxIdx = i; }
                    }
                    // Bereich +/- 15 Graustufen um Peak nullen
                    let start = Math.max(0, maxIdx - 15);
                    let end = Math.min(255, maxIdx + 15);
                    for(let i = start; i <= end; i++) tempHist[i] = 0; 
                }

                // Schritt B: Sliding Window (5 Stufen) für Löcher
                let holeRanges = [];
                let isHoleBin = new Array(256).fill(false);

                for(let i = 0; i <= 255 - 4; i++) {
                    let windowSum = 0;
                    for(let j=0; j<5; j++) windowSum += tempHist[i+j];
                    
                    // Wenn 5er Fenster > 0.4% der Pixel im Kreis
                    if ((windowSum / totalPx) > 0.004) {
                        for(let j=0; j<5; j++) isHoleBin[i+j] = true;
                    }
                }
                
                // Bereiche zusammenfassen
                let startRange = -1;
                for(let i = 0; i <= 256; i++) {
                    if(i < 256 && isHoleBin[i]) {
                        if(startRange === -1) startRange = i;
                    } else {
                        if(startRange !== -1) {
                            holeRanges.push({start: startRange, end: i - 1});
                            startRange = -1;
                        }
                    }
                }

                // Loch-Maske erstellen
                let holeMask = cv.Mat.zeros(512, 512, cv.CV_8U);
                for(let r of holeRanges) {
                    let tM = new cv.Mat();
                    let low = new cv.Mat(512, 512, cv.CV_8UC1, [r.start, 0, 0, 0]);
                    let high = new cv.Mat(512, 512, cv.CV_8UC1, [r.end, 0, 0, 0]);
                    cv.inRange(gray512, low, high, tM);
                    cv.bitwise_or(holeMask, tM, holeMask);
                    tM.delete(); low.delete(); high.delete();
                }
                cv.bitwise_and(holeMask, mask, holeMask);

                // Morphologie
                let k = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(5, 5));
                cv.morphologyEx(holeMask, holeMask, cv.MORPH_CLOSE, k);

                // Konturen & Ringe
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(holeMask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let treffer = [];
                let rNum = parseInt(document.getElementById('ring-count').value);
                let rStep = 250 / rNum;

                for (let i = 0; i < contours.size(); ++i) {
                    let area = cv.contourArea(contours.get(i));
                    if (area > 40) { 
                        let M = cv.moments(contours.get(i));
                        let cx = M.m10/M.m00, cy = M.m01/M.m00;
                        let d = Math.hypot(cx - 256, cy - 256);
                        let p = rNum - Math.floor(d / rStep);
                        p = Math.max(1, Math.min(rNum, p));
                        treffer.push(p);
                        cv.circle(target, new cv.Point(cx, cy), 12, [0, 255, 0, 255], 3);
                    }
                }

                cv.imshow('output-canvas', target);
                video.style.display = 'none';
                outputCanvas.style.display = 'block';
                document.getElementById('result-panel').style.display = 'block';
                zeige(treffer);
                status.innerText = "Fertig!";
                document.getElementById('reset-btn').style.display = 'block';

                // Cleanup
                [src, gray, blurred, circles, cropped, target, gray512, mask, hist, holeMask, k, contours, hierarchy].forEach(m => { if(m) m.delete(); });
                srcVec.delete();

            } catch (e) {
                status.innerText = "Fehler: " + e.message;
                console.error(e);
                scanBtn.disabled = false;
            }
        });

        function zeige(t) {
            const l = document.getElementById('results-list');
            l.innerHTML = "";
            let s = 0;
            t.sort((a,b) => b-a).forEach(p => { 
                l.innerHTML += `<div class="res"><span>Ring ${p}</span><span>1x</span></div>`;
                s += p;
            });
            l.innerHTML += `<div class="res" style="font-weight:bold; color:#4caf50;"><span>Gesamt</span><span>${s}</span></div>`;
        }

        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>

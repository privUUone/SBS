<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schussbild Auswertung</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        canvas { max-width: 100%; border: 1px solid #ccc; margin-top: 10px; }
        #status { font-weight: bold; color: #d9534f; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Schussbild Scanner</h1>
    <div id="status">OpenCV.js lädt... Bitte warten.</div>
    
    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" disabled>
        <label for="rings">Anzahl der Ringe (z.B. 5 für 6-10):</label>
        <input type="number" id="rings" value="5" min="1" max="10" disabled>
        <button id="scanButton" disabled>Scannen & Auswerten</button>
    </div>

    <div>
        <h3>Ergebnis:</h3>
        <canvas id="outputCanvas"></canvas>
    </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
<script src="app.js"></script>

</body>
</html>
